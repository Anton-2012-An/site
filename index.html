<script>
(function() {
    'use strict';

    const JSONBIN_MASTER_KEY = '$2a$10$Xtc.g/ovT7T19MVv9xu8f.URPVCegAY7Atr4bUfHjd96e7vgTXVd6';
    const USERS_BIN_ID = '6a57a81bf5f4af5e29933029';
    const ORDERS_BIN_ID = '6a57a8b9f5f4af5e29933361';

    let users = [], currentUser = null;
    let orders = { food: [], cleaning: [], massage: [], legal: [], court: [], applications: [], vacancies: [], roomVisits: [], passes: [] };
    let notifications = [], supportTickets = [], chats = {}, messages = {}, stickers = [], roles = [], statuses = [];
    let wallets = {}, businessAccounts = {}, promoCodes = [], subscriptions = [], debts = [], cards = [], topUpRequests = [];
    let adminCurrentTab = 'applications';
    let currentChatId = null;
    let supportReplyTarget = null;

    async function readBin(id) {
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { 
                headers: { 'X-Master-Key': JSONBIN_MASTER_KEY } 
            });
            if (!r.ok) throw new Error('Ошибка чтения');
            return (await r.json()).record || {};
        } catch(e) {
            console.error('Ошибка загрузки:', e);
            return {};
        }
    }

    async function writeBin(id, data) {
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
                body: JSON.stringify(data)
            });
            if (!r.ok) throw new Error('Ошибка записи');
            return await r.json();
        } catch(e) {
            console.error('Ошибка сохранения:', e);
            return {};
        }
    }

    function generateId() { let id; do { id = String(Math.floor(10000 + Math.random() * 90000)); } while (users.some(u => u.id === id)); return id; }
    function genSid(p) { return p + '-' + String(Math.floor(1000 + Math.random() * 9000)); }
    function statusText(s) { const map = { 'new': 'Новый', 'cooking': 'Готовится', 'delivering': 'В пути', 'done': 'Выполнено', 'active': 'Активен', 'closed': 'Закрыт', 'accepted': 'Принят', 'rejected': 'Отклонён', 'processing': 'В работе', 'pending': 'На модерации', 'cancelled': 'Отменён', 'approved': 'Одобрено', 'denied': 'Отказано', 'completed': 'Завершено', 'temp_closed': 'Временно закрыт' }; return map[s] || s; }
    function statusClass(s) { const map = { 'new': 'new', 'cooking': 'processing', 'delivering': 'processing', 'done': 'done', 'active': 'active', 'closed': 'closed', 'accepted': 'accepted', 'rejected': 'rejected', 'processing': 'processing', 'pending': 'pending', 'cancelled': 'cancelled', 'approved': 'approved', 'denied': 'denied', 'completed': 'done', 'temp_closed': 'processing' }; return map[s] || 'new'; }
    function now() { return new Date().toLocaleString('ru-RU', { hour12: false }); }
    function showToast(msg) { const e = document.getElementById('toast'); if (!e) return; e.innerHTML = msg; e.classList.add('show'); clearTimeout(window.tt); window.tt = setTimeout(() => e.classList.remove('show'), 3000); }
    function openModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'flex'; }
    function closeModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
    function isBanned(u) { if (!u || !u.banned) return false; if (u.banExpiry && u.banExpiry !== 'forever') { if (new Date(u.banExpiry) > new Date()) return true; u.banned = false; u.banReason = ''; u.banExpiry = null; saveAll(); return false; } return u.banExpiry === 'forever' || u.banned === true; }
    function getUser(id) { return users.find(u => u.id === id); }
    function getWallet(userId) { if (!wallets[userId]) wallets[userId] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] }; return wallets[userId]; }

    async function saveAll() {
        await writeBin(USERS_BIN_ID, { users });
        await writeBin(ORDERS_BIN_ID, {
            orders, notifications, supportTickets, chats, messages, stickers, roles, statuses,
            wallets, businessAccounts, promoCodes, subscriptions, debts, cards, topUpRequests
        });
    }

    function calculateExpiry(value, unit) {
        const now = new Date();
        switch(unit) {
            case 'minutes': now.setMinutes(now.getMinutes() + parseInt(value)); break;
            case 'hours': now.setHours(now.getHours() + parseInt(value)); break;
            case 'days': now.setDate(now.getDate() + parseInt(value)); break;
            case 'months': now.setMonth(now.getMonth() + parseInt(value)); break;
            case 'years': now.setFullYear(now.getFullYear() + parseInt(value)); break;
            default: now.setDate(now.getDate() + parseInt(value));
        }
        return now.toLocaleString('ru-RU');
    }

    function getUnitLabel(unit) {
        const map = { 'minutes': 'мин', 'hours': 'ч', 'days': 'дн', 'months': 'мес', 'years': 'лет' };
        return map[unit] || 'дн';
    }

    // ===== АВТОРИЗАЦИЯ =====
    document.querySelectorAll('[data-tab]').forEach(b => {
        if (b) {
            b.addEventListener('click', function() {
                document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(x => x.classList.remove('active'));
                const formId = 'form' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1);
                const el = document.getElementById(formId);
                if (el) el.classList.add('active');
            });
        }
    });

    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail')?.value?.trim() || '';
            const pass = document.getElementById('loginPassword')?.value?.trim() || '';
            const rem = document.getElementById('rememberMe')?.checked || false;
            const err = document.getElementById('loginError');
            const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === pass);
            if (!user) { if (err) { err.textContent = '❌ Неверный email или пароль'; err.classList.add('show'); } return; }
            if (isBanned(user)) { if (err) { err.textContent = '🚫 Аккаунт забанен'; err.classList.add('show'); } return; }
            if (err) err.classList.remove('show');
            currentUser = user;
            if (rem) localStorage.setItem('ad_remember', JSON.stringify({ id: user.id }));
            else localStorage.removeItem('ad_remember');
            sessionStorage.setItem('ad_session', JSON.stringify({ id: user.id }));
            showMain();
        });
    }

    const registerForm = document.getElementById('registerForm');
    if (registerForm) {
        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const fio = document.getElementById('regFio')?.value?.trim() || '';
            const email = document.getElementById('regEmail')?.value?.trim() || '';
            const pass = document.getElementById('regPassword')?.value?.trim() || '';
            const agree = document.getElementById('regAgreement')?.checked || false;
            const err = document.getElementById('registerError');
            if (!agree) { if (err) { err.textContent = '❌ Примите соглашение'; err.classList.add('show'); } return; }
            if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) { if (err) { err.textContent = '❌ Email уже зарегистрирован'; err.classList.add('show'); } return; }
            if (pass.length < 6) { if (err) { err.textContent = '❌ Пароль минимум 6 символов'; err.classList.add('show'); } return; }
            const nu = { id: generateId(), fio, email, password: pass, role: 'user', status: 'Пользователь', roles: [], avatar: '', bio: '', phone: '', banned: false, banReason: '', banExpiry: null, cardId: '' };
            users.push(nu);
            wallets[nu.id] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
            await saveAll();
            if (err) err.classList.remove('show');
            showToast('✅ Аккаунт создан! Войдите.');
            const loginTab = document.querySelector('[data-tab="login"]');
            if (loginTab) loginTab.click();
            const loginEmail = document.getElementById('loginEmail');
            if (loginEmail) loginEmail.value = email;
        });
    }

    function checkRemember() {
        const d = localStorage.getItem('ad_remember');
        if (!d) return false;
        try {
            const data = JSON.parse(d);
            const user = users.find(u => u.id === data.id);
            if (user && !isBanned(user)) {
                const checkUserName = document.getElementById('checkUserName');
                const checkUserEmail = document.getElementById('checkUserEmail');
                const checkAvatar = document.getElementById('checkAvatar');
                const checkUserOverlay = document.getElementById('checkUserOverlay');
                if (checkUserName) checkUserName.textContent = user.fio;
                if (checkUserEmail) checkUserEmail.textContent = user.email;
                if (checkAvatar) checkAvatar.textContent = user.fio.charAt(0).toUpperCase();
                if (checkUserOverlay) checkUserOverlay.classList.add('active');
                const checkYes = document.getElementById('checkYes');
                if (checkYes) {
                    checkYes.onclick = function() {
                        const overlay = document.getElementById('checkUserOverlay');
                        if (overlay) overlay.classList.remove('active');
                        currentUser = user;
                        sessionStorage.setItem('ad_session', JSON.stringify({ id: user.id }));
                        showMain();
                    };
                }
                const checkNo = document.getElementById('checkNo');
                if (checkNo) {
                    checkNo.onclick = function() {
                        const overlay = document.getElementById('checkUserOverlay');
                        if (overlay) overlay.classList.remove('active');
                        localStorage.removeItem('ad_remember');
                        showAuth();
                    };
                }
                return true;
            }
        } catch (e) {}
        return false;
    }

    function showAuth() {
        const authPage = document.getElementById('authPage');
        const mainPage = document.getElementById('mainPage');
        const panelsContainer = document.getElementById('panelsContainer');
        if (authPage) authPage.style.display = 'flex';
        if (mainPage) mainPage.classList.remove('active');
        if (panelsContainer) panelsContainer.classList.remove('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
    }

    function showMain() {
        const authPage = document.getElementById('authPage');
        const mainPage = document.getElementById('mainPage');
        const panelsContainer = document.getElementById('panelsContainer');
        const headerUserName = document.getElementById('headerUserName');
        const headerUserRole = document.getElementById('headerUserRole');
        const headerAvatar = document.getElementById('headerAvatar');
        
        if (authPage) authPage.style.display = 'none';
        if (mainPage) mainPage.classList.add('active');
        if (panelsContainer) panelsContainer.classList.remove('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
        
        if (headerUserName && currentUser) headerUserName.textContent = currentUser.fio;
        if (headerUserRole && currentUser) headerUserRole.textContent = currentUser.role === 'admin' ? '👑 Админ' : 'Пользователь';
        if (headerAvatar && currentUser) headerAvatar.textContent = currentUser.fio.charAt(0).toUpperCase();
        
        generateSections();
        renderAll();
        initButtons();
    }

    function initButtons() {
        const btns = {
            'btnFoodOrder': 'modalFood',
            'btnWorkVacancy': 'modalVacancy',
            'btnCleaningOrder': 'modalCleaning',
            'btnMassageOrder': 'modalMassage',
            'btnLegalOrder': 'modalLegal',
            'btnCourtOrder': 'modalCourt',
            'btnSupportNew': 'modalSupportNew',
            'btnRoomVisitRequest': 'modalRoomVisitRequest',
            'btnPassOrder': 'modalPassOrder'
        };
        for (const [btnId, modalId] of Object.entries(btns)) {
            const btn = document.getElementById(btnId);
            if (btn) btn.addEventListener('click', () => openModal(modalId));
        }
        document.querySelectorAll('.modal-close').forEach(btn => {
            if (btn) {
                btn.addEventListener('click', function() {
                    const overlay = this.closest('.modal-overlay');
                    if (overlay) overlay.style.display = 'none';
                });
            }
        });
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            if (overlay) {
                overlay.addEventListener('click', function(e) {
                    if (e.target === this) this.style.display = 'none';
                });
            }
        });
    }

    // ===== НАВИГАЦИЯ =====
    const sections = [
        { id: 'food', icon: '🍕', title: 'Еда', desc: 'Заказать' },
        { id: 'work', icon: '💼', title: 'Работа', desc: 'Вакансии' },
        { id: 'cleaning', icon: '🧹', title: 'Уборка', desc: 'Заказать' },
        { id: 'massage', icon: '💆', title: 'Массаж', desc: 'Записаться' },
        { id: 'legal', icon: '⚖️', title: 'Юрист', desc: 'Консультация' },
        { id: 'court', icon: '🏛️', title: 'Суд', desc: 'Подать иск' },
        { id: 'history', icon: '📋', title: 'История', desc: 'Все заказы' },
        { id: 'messenger', icon: '💬', title: 'Мессенджер', desc: 'Общение' },
        { id: 'profile', icon: '👤', title: 'Профиль', desc: 'Личные данные' },
        { id: 'support', icon: '🆘', title: 'Поддержка', desc: 'Написать' },
        { id: 'wallet', icon: '💰', title: 'Кошелёк', desc: 'Баланс' },
        { id: 'bank', icon: '💳', title: 'Банк', desc: 'Карты и QR' },
        { id: 'roomvisit', icon: '🚪', title: 'Посещение комнаты', desc: 'Заявки на вход' },
        { id: 'pass', icon: '🎫', title: 'Пропуска', desc: 'Заказать пропуск' },
        { id: 'admin', icon: '👑', title: 'Админка', desc: 'Управление', badge: 'Только админ' }
    ];

    function generateSections() {
        const grid = document.getElementById('sectionsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        sections.forEach(sec => {
            if (sec.id === 'admin' && currentUser.role !== 'admin') return;
            const card = document.createElement('div');
            card.className = 'section-card';
            card.dataset.section = sec.id;
            card.innerHTML = `
                <div class="section-image" style="background:linear-gradient(135deg,#fef3c7,#fde68a);">${sec.icon}</div>
                <div class="section-info">
                    <h3>${sec.icon} ${sec.title}</h3>
                    <p>${sec.desc}</p>
                    ${sec.badge ? `<span class="section-badge">${sec.badge}</span>` : ''}
                </div>
            `;
            card.addEventListener('click', function() {
                const secId = this.dataset.section;
                if (secId === 'admin' && currentUser.role !== 'admin') { showToast('⛔ Доступ только админу'); return; }
                showPanel(secId);
            });
            grid.appendChild(card);
        });
    }

    function showPanel(panelId) {
        const mainPage = document.getElementById('mainPage');
        const panelsContainer = document.getElementById('panelsContainer');
        if (mainPage) mainPage.classList.remove('active');
        if (panelsContainer) panelsContainer.classList.add('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
        const el = document.getElementById('panel-' + panelId);
        if (el) el.classList.add('active');
        renderAll();
        if (panelId === 'admin') renderAdmin();
        if (panelId === 'history') renderHistory();
        if (panelId === 'messenger') renderMessenger();
        if (panelId === 'profile') renderProfile();
        if (panelId === 'support') renderSupport();
        if (panelId === 'wallet') renderWallet();
        if (panelId === 'bank') renderBank();
        if (panelId === 'roomvisit') renderRoomVisit();
        if (panelId === 'pass') renderPass();
    }

    function goBack() {
        const mainPage = document.getElementById('mainPage');
        const panelsContainer = document.getElementById('panelsContainer');
        if (mainPage) mainPage.classList.add('active');
        if (panelsContainer) panelsContainer.classList.remove('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
        renderAll();
    }

    document.addEventListener('click', function(e) {
        const backBtn = e.target.closest('[data-back]');
        if (backBtn) { e.preventDefault(); goBack(); }
        const logoutBtn = e.target.closest('#logoutBtn');
        if (logoutBtn) {
            sessionStorage.removeItem('ad_session');
            localStorage.removeItem('ad_remember');
            currentUser = null;
            showAuth();
        }
    });

    // ===== РАЗДЕЛ ПРОПУСКОВ =====
    
    const formPassOrder = document.getElementById('formPassOrder');
    if (formPassOrder) {
        formPassOrder.addEventListener('submit', async function(e) {
            e.preventDefault();
            const fio = document.getElementById('passFio')?.value?.trim() || '';
            const address = document.getElementById('passAddress')?.value?.trim() || '';
            const purpose = document.getElementById('passPurpose')?.value?.trim() || '';
            const duration = parseInt(document.getElementById('passDuration')?.value) || 1;
            const unit = document.getElementById('passDurationUnit')?.value || 'days';
            
            if (!fio || !address || !purpose) {
                showToast('❌ Заполните все поля');
                return;
            }
            
            const passId = genSid('PASS');
            const validUntil = calculateExpiry(duration, unit);
            
            const newPass = {
                id: passId,
                userId: currentUser.id,
                userFio: currentUser.fio,
                fio: fio,
                address: address,
                purpose: purpose,
                duration: duration,
                durationUnit: unit,
                status: 'pending',
                createdAt: now(),
                validUntil: validUntil,
                code: passId,
                visits: [],
                actions: [{ action: 'Создан', time: now(), details: `Срок ${duration} ${getUnitLabel(unit)}` }],
                closeReason: '',
                tempCloseReason: '',
                tempCloseUntil: ''
            };
            
            if (!orders.passes) orders.passes = [];
            orders.passes.push(newPass);
            await saveAll();
            renderAll();
            showToast('✅ Заявка на пропуск отправлена!');
            closeModal('modalPassOrder');
            this.reset();
        });
    }

    function renderPass() {
        const container = document.getElementById('passContainer');
        if (!container) return;
        
        if (!orders.passes) orders.passes = [];
        const items = orders.passes.filter(p => p.userId === currentUser.id);
        if (!items.length) {
            container.innerHTML = '<div class="empty-state">Нет пропусков</div>';
            return;
        }
        
        container.innerHTML = items.map(p => {
            let statusHtml = '';
            if (p.status === 'pending') statusHtml = '<span class="card-status status-pending">⏳ На модерации</span>';
            else if (p.status === 'active') statusHtml = '<span class="card-status status-active">✅ Активен</span>';
            else if (p.status === 'temp_closed') statusHtml = '<span class="card-status status-processing">⏸️ Временно закрыт</span>';
            else if (p.status === 'closed') statusHtml = '<span class="card-status status-closed">🔒 Закрыт</span>';
            
            const now = new Date();
            const expiryDate = new Date(p.validUntil);
            let expiryWarning = '';
            if (p.status === 'active' && expiryDate < now) {
                expiryWarning = '<div style="color:#a14f4f;font-size:0.8rem;margin-top:4px;">⚠️ Срок действия истёк</div>';
            }
            
            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-id">${p.id}</span>
                        ${statusHtml}
                    </div>
                    <div class="card-detail"><strong>ФИО:</strong> ${p.fio}</div>
                    <div class="card-detail"><strong>Адрес:</strong> ${p.address}</div>
                    <div class="card-detail"><strong>Цель:</strong> ${p.purpose}</div>
                    <div class="card-detail"><strong>Срок:</strong> ${p.duration} ${getUnitLabel(p.durationUnit || 'days')}</div>
                    <div class="card-detail"><strong>Действует до:</strong> ${p.validUntil}</div>
                    ${expiryWarning}
                    ${p.tempCloseReason ? `<div class="card-detail" style="color:#a86f1a;"><strong>Временно закрыт:</strong> ${p.tempCloseReason} (до ${p.tempCloseUntil})</div>` : ''}
                    ${p.closeReason ? `<div class="card-detail" style="color:#a14f4f;"><strong>Закрыт:</strong> ${p.closeReason}</div>` : ''}
                    <div class="card-detail" style="font-size:0.7rem;color:#8b97a8;">Создан: ${p.createdAt}</div>
                    ${p.status === 'active' || p.status === 'temp_closed' ? `
                        <div style="margin-top:0.5rem;">
                            <p><strong>Ваш QR-код пропуска:</strong></p>
                            <div id="qrContainerPass_${p.id}" style="display:flex;justify-content:center;margin:0.5rem 0;"></div>
                            <p style="font-size:0.7rem;color:#8b97a8;">Код: ${p.code}</p>
                        </div>
                    ` : ''}
                    ${p.status === 'closed' ? `
                        <div style="margin-top:0.5rem;padding:0.5rem;background:#fde8e8;border-radius:12px;color:#a14f4f;font-size:0.8rem;">
                            ⚠️ Пропуск закрыт. Верните карточку с кодом туда, где выпускали.
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
        
        items.filter(p => p.status === 'active' || p.status === 'temp_closed').forEach(p => {
            setTimeout(() => {
                const container = document.getElementById('qrContainerPass_' + p.id);
                if (container && !container.querySelector('canvas')) {
                    try {
                        new QRCode(container, {
                            text: 'pass:' + p.id,
                            width: 180,
                            height: 180,
                            colorDark: "#000000",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    } catch (e) {
                        container.innerHTML = '<p style="color:#8b97a8;">QR-код</p>';
                    }
                }
            }, 200);
        });
    }

    // ===== АДМИН: ПРОПУСКА =====
    function renderAdminPass(container) {
        if (!orders.passes) orders.passes = [];
        const passes = orders.passes;
        if (!passes.length) {
            container.innerHTML = '<div class="empty-state">Нет пропусков</div>';
            return;
        }
        
        let html = `<div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
            <button class="btn-sm blue" id="adminPassScanBtn">📷 Сканировать QR</button>
            <button class="btn-sm green" id="adminPassRefreshBtn">🔄 Обновить</button>
        </div><div class="cards-grid">`;
        
        passes.forEach(p => {
            let statusText = '', statusClass = '';
            if (p.status === 'pending') { statusText = '⏳ Ожидает'; statusClass = 'pending'; }
            else if (p.status === 'active') { statusText = '✅ Активен'; statusClass = 'active'; }
            else if (p.status === 'temp_closed') { statusText = '⏸️ Временно закрыт'; statusClass = 'processing'; }
            else if (p.status === 'closed') { statusText = '🔒 Закрыт'; statusClass = 'closed'; }
            
            const now = new Date();
            const expiryDate = new Date(p.validUntil);
            let expiryWarning = '';
            if (p.status === 'active' && expiryDate < now) {
                expiryWarning = '<span style="color:#a14f4f;font-size:0.7rem;">⚠️ Истёк</span>';
            }
            
            html += `
                <div class="card">
                    <div class="card-header">
                        <span class="card-id">${p.id}</span>
                        <span class="card-status status-${statusClass}">${statusText}</span>
                        ${expiryWarning}
                    </div>
                    <div class="card-detail"><strong>Пользователь:</strong> ${p.userFio} (${p.userId})</div>
                    <div class="card-detail"><strong>ФИО:</strong> ${p.fio}</div>
                    <div class="card-detail"><strong>Адрес:</strong> ${p.address}</div>
                    <div class="card-detail"><strong>Цель:</strong> ${p.purpose}</div>
                    <div class="card-detail"><strong>Срок:</strong> ${p.duration} ${getUnitLabel(p.durationUnit || 'days')}</div>
                    <div class="card-detail"><strong>Действует до:</strong> ${p.validUntil}</div>

    const formPassExtend = document.getElementById('formPassExtend');
    if (formPassExtend) {
        formPassExtend.addEventListener('submit', async function(e) {
            e.preventDefault();
            const passId = document.getElementById('passExtendId')?.value || '';
            const reason = document.getElementById('passExtendReason')?.value?.trim() || '';
            const days = parseInt(document.getElementById('passExtendDays')?.value) || 30;
            const unit = document.getElementById('passExtendUnit')?.value || 'days';
            
            if (!reason || days < 1) {
                showToast('❌ Заполните все поля');
                return;
            }
            
            if (!orders.passes) orders.passes = [];
            const pass = orders.passes.find(p => p.id === passId);
            if (!pass) { showToast('❌ Пропуск не найден'); return; }
            
            if (pass.status === 'closed') {
                pass.status = 'active';
                pass.closeReason = '';
            }
            
            const currentDate = new Date(pass.validUntil);
            switch(unit) {
                case 'minutes': currentDate.setMinutes(currentDate.getMinutes() + days); break;
                case 'hours': currentDate.setHours(currentDate.getHours() + days); break;
                case 'days': currentDate.setDate(currentDate.getDate() + days); break;
                case 'months': currentDate.setMonth(currentDate.getMonth() + days); break;
                case 'years': currentDate.setFullYear(currentDate.getFullYear() + days); break;
                default: currentDate.setDate(currentDate.getDate() + days);
            }
            pass.validUntil = currentDate.toLocaleString('ru-RU');
            pass.duration = days;
            pass.durationUnit = unit;
            if (!pass.actions) pass.actions = [];
            pass.actions.push({ action: 'Продлён', time: now(), details: `Причина: ${reason}, продлён на ${days} ${getUnitLabel(unit)}` });

            renderAll();

            closeModal('modalPassExtend');
            this.reset();
        });
    }

    // ===== СКАНЕР QR ДЛЯ ПРОПУСКОВ =====
    function startPassScanner(passId) {
        const readerDiv = document.getElementById('passScanner');
        if (!readerDiv) return;
        readerDiv.innerHTML = '';
        
        if (passId) {
            if (!orders.passes) orders.passes = [];
            const pass = orders.passes.find(p => p.id === passId);
            if (pass) {
                showPassScanResult(pass);
                return;
            }
        }
        
        try {
            const scanner = new Html5Qrcode("passScanner");
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async function(decodedText) {
                    if (decodedText.startsWith('pass:')) {
                        const id = decodedText.replace('pass:', '');
                        if (!orders.passes) orders.passes = [];
                        const pass = orders.passes.find(p => p.id === id);
                        if (!pass) {
                            showToast('❌ Пропуск не найден');
                            scanner.stop();
                            return;
                        }
                        scanner.stop();
                        showPassScanResult(pass);
                    }
                },
                function(err) {}
            );
        } catch (e) {
            showToast('❌ Ошибка запуска сканера');
        }
    }

    function showPassScanResult(pass) {
        const resultDiv = document.getElementById('passScanResult');
        if (!resultDiv) return;
        
        let statusText = '';
        if (pass.status === 'pending') statusText = '⏳ На модерации';
        else if (pass.status === 'active') statusText = '✅ Активен';
        else if (pass.status === 'temp_closed') statusText = '⏸️ Временно закрыт';
        else if (pass.status === 'closed') statusText = '🔒 Закрыт';
        
        let actionsHtml = '';
        if (currentUser.role === 'admin') {
            actionsHtml = `
                <div style="margin-top:1rem;">
                    <button class="btn-sm green" onclick="window.addVisitFromScan('${pass.id}')">📝 Добавить посещение</button>
                    <button class="btn-sm danger" onclick="window.closePassFromScan('${pass.id}')">🔒 Закрыть</button>
                    <button class="btn-sm gold" onclick="window.tempClosePassFromScan('${pass.id}')">⏸️ Временно закрыть</button>
                    <button class="btn-sm blue" onclick="window.extendPassFromScan('${pass.id}')">🔄 Продлить</button>
                    <button class="btn-sm purple" onclick="window.showPassVisits('${pass.id}')">📋 Посещения</button>
                    <button class="btn-sm gold" onclick="window.showPassActions('${pass.id}')">📋 Все действия</button>
                </div>
            `;
        }
        
        resultDiv.innerHTML = `
            <div class="card">
                <div class="card-header">
                    <span class="card-id">${pass.id}</span>
                    <span class="card-status status-${statusClass(pass.status)}">${statusText}</span>
                </div>
                <div class="card-detail"><strong>Пользователь:</strong> ${pass.userFio}</div>

                ${pass.tempCloseReason ? `<div class="card-detail" style="color:#a86f1a;">⏸️ ${pass.tempCloseReason} (до ${pass.tempCloseUntil})</div>` : ''}
                ${pass.closeReason ? `<div class="card-detail" style="color:#a14f4f;">🔒 ${pass.closeReason}</div>` : ''}
                <div class="card-detail"><strong>Код:</strong> ${pass.code}</div>
                ${actionsHtml}
            </div>
            <button class="btn-sm" onclick="document.getElementById('passScanResult').innerHTML = ''; closeModal('modalPassScan')">Закрыть</button>
        `;
    }

    // ----- Обработчики админа -----
    async function handleApprove(e) {
        const btn = e.currentTarget;
        const orderId = btn.dataset.orderId;
        const input = document.querySelector(`.admin-price-input[data-order-id="${orderId}"]`);
        const price = parseFloat(input?.value);
        if (isNaN(price) || price <= 0) { showToast('❌ Введите цену'); return; }
        let order = null;
        for (const key in orders) {
            if (Array.isArray(orders[key])) {
                const found = orders[key].find(o => o.id === orderId);
                if (found) { order = found; break; }
            }
        }
        if (!order) { showToast('❌ Заказ не найден'); return; }
        order.status = 'approved';
        order.price = price;
        order.adminComment = 'Одобрено';
        await saveAll();
        renderAdmin();
        showToast('✅ Заказ одобрен');
    }

    async function handleReject(e) {
        const btn = e.currentTarget;
        const orderId = btn.dataset.orderId;
        const reason = prompt('Причина отказа:');

    function startRoomVisitScanner(visitId) {
        const readerDiv = document.getElementById('roomVisitScanner');
        if (!readerDiv) return;
        readerDiv.innerHTML = '';
        try {
            const scanner = new Html5Qrcode("roomVisitScanner");
            scanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async function(decodedText) {
                    if (decodedText.startsWith('roomvisit:')) {
                        const id = decodedText.replace('roomvisit:', '');
                        const visit = orders.roomVisits.find(v => v.id === id);
                        if (!visit) { showToast('❌ Заявка не найдена'); scanner.stop(); closeModal('modalRoomVisitScan'); return; }
                        if (visit.status !== 'approved') { showToast('❌ Заявка не одобрена'); scanner.stop(); closeModal('modalRoomVisitScan'); return; }
                        const resultDiv = document.getElementById('roomVisitScanResult');
                        if (resultDiv) resultDiv.innerHTML = `<p style="color:#27ae60;">✅ QR-код действителен</p>`;
                        scanner.stop();
                    }
                },
                function(err) {}
            );
        } catch (e) {
            showToast('❌ Ошибка запуска сканера');
        }
    }

    }

    function renderAdminCards(container) {
        if (cards.length === 0) {
            container.innerHTML = '<div class="empty-state">Нет карт</div>';
            return;
        }
        container.innerHTML = cards.map(c => {
            const user = getUser(c.userId);
            return `
                <div class="card">
                    <div class="card-header"><span class="card-id">${c.id}</span><span class="card-status status-${c.blocked ? 'cancelled' : 'approved'}">${c.blocked ? '🔒 Заблокирована' : '✅ Активна'}</span></div>
                    <div class="card-detail"><strong>Пользователь:</strong> ${user ? user.fio : c.userId}</div>
                    <div class="card-detail"><strong>Номер:</strong> ${c.cardNumber}</div>
                    <div class="card-detail"><strong>Выпущена:</strong> ${c.issued}</div>
                    ${c.blocked ? `<div class="card-detail" style="color:#a14f4f;">Причина: ${c.blockReason}</div>` : ''}
                    <div class="card-actions">
                        ${!c.blocked ? `<button class="btn-sm danger" data-card-block="${c.id}">🔒</button>` : `<button class="btn-sm green" data-card-unblock="${c.id}">🔓</button>`}
                    </div>
                </div>
            `;
        }).join('');
    }

    function openUserManage(user) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay active';
        overlay.style.display = 'flex';
        overlay.style.position = 'fixed';
        overlay.style.top = '0';
        overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.background = 'rgba(10,10,14,0.4)';
        overlay.style.backdropFilter = 'blur(3px)';
        overlay.style.justifyContent = 'center';
        overlay.style.alignItems = 'center';
        overlay.style.zIndex = '999';
        overlay.style.padding = '1rem';
        const info = getBanInfo(user);
        overlay.innerHTML = `
            <div class="modal" style="max-width:650px;width:100%;max-height:90vh;overflow-y:auto;border-radius:30px;padding:2rem;">
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
                <h2>👤 ${user.fio}</h2>
                <div><strong>ID:</strong> ${user.id}</div>
                <div><strong>Email:</strong> ${user.email}</div>
                <div><strong>Роль:</strong> ${user.role || 'Пользователь'}</div>
                <div><strong>Статус:</strong> ${user.status}</div>
                ${info ? `<div style="color:#a14f4f;"><strong>Забанен:</strong> ${info.reason} (${info.expiry})</div>` : ''}
                <div><strong>Роли:</strong> ${user.roles && user.roles.length ? user.roles.join(', ') : '—'}</div>
                <div style="margin-top:1rem;">
                    <label>Изменить статус:</label>
                    <select id="adminStatusSelect" style="padding:.4rem;border-radius:14px;border:1px solid #d0d7e2;">
                        ${statuses.map(s => `<option value="${s.name}" ${user.status === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
                        <option value="custom">➕ Свой</option>
                    </select>
                    <input type="text" id="adminCustomStatus" placeholder="Введите новый статус" style="display:none;padding:.4rem;border-radius:14px;border:1px solid #d0d7e2;margin-top:4px;width:100%;">
                </div>
                <div style="margin-top:1rem;">
                    <label>Назначить роли:</label>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
                        ${roles.map(r => `
                            <label style="font-size:.8rem;"><input type="checkbox" class="role-check" value="${r.name}" ${user.roles && user.roles.includes(r.name) ? 'checked' : ''}> ${r.name}</label>
                        `).join('')}
                    </div>
                    <button class="btn-sm green" id="adminSaveRolesBtn">💾 Сохранить</button>
                </div>
                <div style="margin-top:1rem;">
                    <button class="btn-sm danger" id="adminUnbanBtn" ${info ? '' : 'disabled'}>🔓 Разбанить</button>
                    <button class="btn-sm" onclick="this.closest('.modal-overlay').remove()">Закрыть</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        const adminStatusSelect = document.getElementById('adminStatusSelect');
        if (adminStatusSelect) {
            adminStatusSelect.addEventListener('change', function() {
                document.getElementById('adminCustomStatus').style.display = this.value === 'custom' ? 'block' : 'none';
            });
        }
        const adminSaveRolesBtn = document.getElementById('adminSaveRolesBtn');
        if (adminSaveRolesBtn) {
            adminSaveRolesBtn.addEventListener('click', async function() {
                const checked = Array.from(overlay.querySelectorAll('.role-check:checked')).map(cb => cb.value);
                user.roles = checked;
                let status = document.getElementById('adminStatusSelect').value;
                if (status === 'custom') {
                    const custom = document.getElementById('adminCustomStatus').value.trim();
                    if (custom) {
                        status = custom;
                        if (!statuses.some(s => s.name === custom)) {
                            statuses.push({ id: 'status_' + Date.now(), name: custom });
                        }
                    } else status = user.status;
                }
                user.status = status;
                await saveAll();
                showToast('✅ Данные обновлены');
                overlay.remove();
                renderAdmin();
            });
        }
        const adminUnbanBtn = document.getElementById('adminUnbanBtn');
        if (adminUnbanBtn) {
            adminUnbanBtn.addEventListener('click', async function() {
                if (user) {
                    user.banned = false;
                    user.banReason = '';
                    user.banExpiry = null;
                    await saveAll();
                    showToast('🔓 Пользователь разбанен');
                    overlay.remove();
                    renderAdmin();
                }
            });
        }
    }

    // ===== ОБРАБОТЧИКИ ФОРМ =====
    const formFood = document.getElementById('formFood');

    const formLegal = document.getElementById('formLegal');

            await saveAll();

    const formVacancy = document.getElementById('formVacancy');
    if (formVacancy) {
        formVacancy.addEventListener('submit', async function(e) {
            e.preventDefault();

            closeModal('modalVacancy');
            this.reset();

    }

    const formApplication = document.getElementById('formApplication');
    if (formApplication) {
        formApplication.addEventListener('submit', async function(e) {
            e.preventDefault();
            const vacancyId = document.getElementById('appVacancy')?.value?.trim() || '';
            const info = document.getElementById('appInfo')?.value?.trim() || '';
            const extras = Array.from(document.querySelectorAll('#formApplication .checkbox-group input:checked')).map(cb => cb.value);
            orders.applications.push({ id: genSid('APP'), userId: currentUser.id, userFio: currentUser.fio, vacancyId, info, extras, status: 'pending', time: now() });
            await saveAll();

    const formSupportNew = document.getElementById('formSupportNew');
    if (formSupportNew) {
        formSupportNew.addEventListener('submit', async function(e) {

            supportTickets.push({ id: genSid('SPT'), userId: currentUser.id, userFio: currentUser.fio, problem, urgency, status: 'open', time: now(), adminReply: '' });

        });

    const formSupportReply = document.getElementById('formSupportReply');
    if (formSupportReply) {
        formSupportReply.addEventListener('submit', async function(e) {
            e.preventDefault();
            const reply = document.getElementById('supportReplyText')?.value?.trim() || '';
            if (supportReplyTarget !== null && supportTickets[supportReplyTarget]) {
                supportTickets[supportReplyTarget].adminReply = reply;
                supportTickets[supportReplyTarget].status = 'resolved';
                await saveAll();
                showToast('✅ Ответ отправлен');
                closeModal('modalSupportReply');
                renderAdmin();
            }
        });
    }

    const formTopUpRequest = document.getElementById('formTopUpRequest');
    if (formTopUpRequest) {
        formTopUpRequest.addEventListener('submit', async function(e) {
            e.preventDefault();
            const message = document.getElementById('topUpMessage')?.value?.trim() || '';
            if (!message) { showToast('❌ Напишите сообщение'); return; }
            topUpRequests.push({ id: genSid('TUR'), userId: currentUser.id, userFio: currentUser.fio, message, status: 'pending', time: now(), adminReply: '' });
            await saveAll();
            showToast('✅ Запрос отправлен');

            this.reset();
        });

            const discount = parseInt(document.getElementById('promoDiscount')?.value) || 0;
            const validUntil = document.getElementById('promoValidUntil')?.value || '';
            const maxActivations = parseInt(document.getElementById('promoMaxActivations')?.value) || 1;
            const service = document.getElementById('promoService')?.value || 'all';
            if (promoCodes.some(p => p.code === code)) { showToast('❌ Промокод уже существует'); return; }
            promoCodes.push({ code, discount, validUntil, maxActivations, service, usedCount: 0, usedBy: [] });
            await saveAll();
            showToast('🎫 Промокод создан!');
            closeModal('modalPromoCreate');
            this.reset();
            renderAdmin();
        });
    }

    const formSubscriptionIssue = document.getElementById('formSubscriptionIssue');
    if (formSubscriptionIssue) {
        formSubscriptionIssue.addEventListener('submit', async function(e) {
            e.preventDefault();
            const userId = document.getElementById('subUserId')?.value?.trim() || '';
            const service = document.getElementById('subService')?.value || '';
            const sessions = parseInt(document.getElementById('subSessions')?.value) || 1;
            const validUntil = document.getElementById('subValidUntil')?.value || '';
            if (!getUser(userId)) { showToast('❌ Пользователь не найден'); return; }
            subscriptions.push({ id: genSid('SUB'), userId, service, remainingSessions: sessions, validUntil, issued: now() });
            await saveAll();
            showToast('✅ Абонемент выдан!');
            closeModal('modalSubscriptionIssue');
            this.reset();
            renderAdmin();
        });

    // ===== ОБЩИЙ РЕНДЕР =====
    function renderAll() {
        renderFood();
        renderVacancies();
        renderApplications();
        renderCleaning();
        renderMassage();
        renderLegal();
        renderCourt();
        renderPass();
    }

    // ===== ЗАПУСК =====
    document.addEventListener('DOMContentLoaded', function() {
        loadAll();
    });

    async function loadAll() {
        try {
            const uData = await readBin(USERS_BIN_ID);
            users = uData.users || [];
            const oData = await readBin(ORDERS_BIN_ID);
            orders = oData.orders || { food: [], cleaning: [], massage: [], legal: [], court: [], applications: [], vacancies: [], roomVisits: [], passes: [] };
            notifications = oData.notifications || [];
            supportTickets = oData.supportTickets || [];
            chats = oData.chats || {};
            messages = oData.messages || {};
            stickers = oData.stickers || [];
            roles = oData.roles || [];
            statuses = oData.statuses || [];
            wallets = oData.wallets || {};
            businessAccounts = oData.businessAccounts || {};
            promoCodes = oData.promoCodes || [];
            subscriptions = oData.subscriptions || [];
            debts = oData.debts || [];
            cards = oData.cards || [];
            topUpRequests = oData.topUpRequests || [];

            if (!orders.passes) orders.passes = [];

            users.forEach(u => {
                if (!wallets[u.id]) wallets[u.id] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
            });
            if (wallets['00000']) wallets['00000'].balance = 999999999;

            if (!users.some(u => u.id === '00000')) {
                users.push({ id: '00000', fio: 'Администратор', email: 'admin@ad.systems', password: '31441537a', role: 'admin', status: 'Администратор', roles: [], avatar: '', bio: '', phone: '', banned: false, banReason: '', banExpiry: null, cardId: '' });
                wallets['00000'] = { balance: 999999999, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
                await saveAll();
            }

            const session = sessionStorage.getItem('ad_session');
            if (session) {
                const p = JSON.parse(session);
                const u = users.find(x => x.id === p.id);
                if (u && !isBanned(u)) { currentUser = u; showMain(); return; }
            }
            if (!checkRemember()) showAuth();
        } catch (e) { 
            console.error('Ошибка загрузки:', e); 
            showToast('❌ Ошибка загрузки данных');
            showAuth(); 
        }
    }

})();
</script>
