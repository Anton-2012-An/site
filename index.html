    <script>
        (function() {
            'use strict';

            // ===== КОНФИГ =====
            const JSONBIN_MASTER_KEY = '$2a$10$xTc.g/ovT7T19WYv9xu8f.URPVCegAY7Atr4bUFhjd96e7vgTXVd6';
            const USERS_BIN_ID = '6a56624dda38895dfe5cb6ef';
            const ORDERS_BIN_ID = '6a569af5f5f4af5e298f4479';

            // ===== API (без изменений) =====
            async function readBin(id) {
                const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY } });
                if (!r.ok) throw new Error('Ошибка чтения');
                return (await r.json()).record || {};
            }
            async function writeBin(id, data) {
                const r = await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
                    body: JSON.stringify(data)
                });
                if (!r.ok) throw new Error('Ошибка записи');
                return await r.json();
            }

            // ===== ДАННЫЕ (без изменений) =====
            let users = [], currentUser = null;
            let orders = { food: [], cleaning: [], massage: [], legal: [], court: [], applications: [], vacancies: [], pendingVacancies: [], roomVisits: [] };
            let notifications = [], supportTickets = [], chats = {}, messages = {}, stickers = {}, roles = [], statuses = [];
            let wallets = {}, businessAccounts = {}, promoCodes = [], subscriptions = [], debts = [], cards = [], topUpRequests = [];
            let adminCurrentTab = 'applications';
            let rejectTarget = null, approveTarget = null, banTarget = null, statusChangeTarget = null, courtResponseTarget = null, supportReplyTarget = null;
            let currentChatId = null;
            let scanner = null;
            let roomVisitEditTarget = null, roomVisitScanTarget = null;

            // ===== ВСПОМОГАТЕЛЬНЫЕ (без изменений) =====
            function generateId() { let id, e; do { id = String(Math.floor(10000 + Math.random() * 90000)); e = users.some(u => u.id === id); } while (e); return id; }
            function genSid(p) { return p + '-' + String(Math.floor(1000 + Math.random() * 9000)); }
            function statusText(s) {
                const map = { 'new': 'Новый', 'cooking': 'Готовится', 'delivering': 'В пути', 'done': 'Выполнено', 'active': 'Активна', 'closed': 'Закрыта', 'accepted': 'Принят', 'rejected': 'Отклонён', 'processing': 'В работе', 'pending': 'На модерации', 'cancelled': 'Отменён', 'approved': 'Одобрено', 'denied': 'Отказано', 'completed': 'Завершено' };
                return map[s] || s;
            }
            function statusClass(s) {
                const map = { 'new': 'new', 'cooking': 'processing', 'delivering': 'processing', 'done': 'done', 'active': 'active', 'closed': 'closed', 'accepted': 'accepted', 'rejected': 'rejected', 'processing': 'processing', 'pending': 'pending', 'cancelled': 'cancelled', 'approved': 'approved', 'denied': 'denied', 'completed': 'done' };
                return map[s] || 'new';
            }
            function now() { return new Date().toLocaleString('ru-RU', { hour12: false }); }
            function showToast(msg) { const e = document.getElementById('toast'); e.innerHTML = msg; e.classList.add('show'); clearTimeout(window.tt); window.tt = setTimeout(() => e.classList.remove('show'), 3000); }
            function openModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'flex'; }
            function closeModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
            function isBanned(u) {
                if (!u || !u.banned) return false;
                if (u.banExpiry && u.banExpiry !== 'forever') {
                    if (new Date(u.banExpiry) > new Date()) return true;
                    u.banned = false; u.banReason = ''; u.banExpiry = null; saveAll(); return false;
                }
                return u.banExpiry === 'forever' || u.banned === true;
            }
            function getBanInfo(u) { if (!u || !u.banned) return null; if (u.banExpiry === 'forever') return { reason: u.banReason, expiry: 'навсегда' }; if (u.banExpiry) { const d = new Date(u.banExpiry); if (d > new Date()) return { reason: u.banReason, expiry: d.toLocaleString('ru-RU') }; u.banned = false; u.banReason = ''; u.banExpiry = null; saveAll(); return null; } return null; }
            function addNotif(userId, title, msg, comment = '', reason = '') {
                notifications.unshift({ id: genSid('NT'), userId, title, message: msg, comment, reason, time: now(), read: false });
                saveAll();
            }
            function getUser(id) { return users.find(u => u.id === id); }
            function getWallet(userId) { return wallets[userId] || { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] }; }

            // ===== ТРАНЗАКЦИИ (без изменений) =====
            async function processTransaction(fromUserId, toUserId, amount, description, type = 'payment') {
                const fromW = getWallet(fromUserId);
                const toW = getWallet(toUserId);
                if (!fromW || !toW) { showToast('❌ Ошибка: кошелёк не найден'); return false; }
                if (fromW.blocked) { showToast('❌ Ваша карта заблокирована'); return false; }
                if (fromW.balance < amount) { showToast('❌ Недостаточно средств'); return false; }
                fromW.balance -= amount;
                toW.balance += amount;
                const txn = { id: 'txn_' + Date.now(), type, amount, description, from: fromUserId, to: toUserId, time: now() };
                fromW.transactions.push(txn);
                toW.transactions.push(txn);
                for (const b in businessAccounts) {
                    if (description.includes(b) || (toUserId === '00000' && description.includes('бизнес'))) {
                        businessAccounts[b].balance += amount * 0.7;
                        if (!businessAccounts[b].transactions) businessAccounts[b].transactions = [];
                        businessAccounts[b].transactions.push(txn);
                        break;
                    }
                }
                await saveAll();
                addNotif(fromUserId, '💳 Оплата', `Списано ${amount} ₽. ${description}`);
                addNotif(toUserId, '💰 Поступление', `Получено ${amount} ₽. ${description}`);
                addNotif(fromUserId, '🧾 Чек', `Чек на сумму ${amount} ₽. Услуга: ${description}`);
                return true;
            }

            // ===== ПРОМОКОДЫ (без изменений) =====
            function applyPromo(code, userId, service) {
                const promo = promoCodes.find(p => p.code.toUpperCase() === code.toUpperCase());
                if (!promo) { showToast('❌ Промокод не найден'); return null; }
                if (new Date(promo.validUntil) < new Date()) { showToast('❌ Промокод истёк'); return null; }
                if (promo.usedCount >= promo.maxActivations) { showToast('❌ Промокод исчерпан'); return null; }
                if (promo.usedBy.includes(userId)) { showToast('❌ Вы уже использовали этот промокод'); return null; }
                if (promo.service !== 'all' && promo.service !== service) { showToast('❌ Промокод не подходит для этой услуги'); return null; }
                promo.usedCount++;
                promo.usedBy.push(userId);
                saveAll();
                return promo.discount;
            }

            // ===== АБОНЕМЕНТЫ (без изменений) =====
            function hasSubscription(userId, service) {
                const sub = subscriptions.find(s => s.userId === userId && s.service === service && new Date(s.validUntil) > new Date() && s.remainingSessions > 0);
                return sub || null;
            }
            async function useSubscription(userId, service) {
                const sub = hasSubscription(userId, service);
                if (sub) {
                    sub.remainingSessions--;
                    await saveAll();
                    return true;
                }
                return false;
            }

            // ===== QR-КОДЫ (без изменений) =====
            function generateRoomVisitQR(visitId) {
                const container = document.getElementById('qrContainerRoomVisit_' + visitId);
                if (!container) return;
                container.innerHTML = '';
                try {
                    new QRCode(container, {
                        text: `roomvisit:${visitId}`,
                        width: 180,
                        height: 180,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                } catch (e) {
                    container.innerHTML = '<p style="color:#8b97a8;">QR-код (библиотека не загружена)</p>';
                }
            }

            // ===== ВЫПУСК КАРТЫ (без изменений) =====
            async function issueCard(userId) {
                const user = getUser(userId);
                if (!user) return alert('Пользователь не найден');
                let number = '';
                for (let i = 0; i < 16; i++) {
                    number += Math.floor(Math.random() * 10);
                    if (i === 3 || i === 7 || i === 11) number += ' ';
                }
                const card = { id: 'card_' + Date.now(), userId: userId, cardNumber: number, qrCode: '', issued: now(), blocked: false, blockReason: '', blockExpiry: null };
                cards.push(card);
                user.cardId = card.id;
                if (wallets[userId]) wallets[userId].cardNumber = number;
                await saveAll();
                showToast('✅ Карта выпущена! QR-код сгенерирован.');
                renderAll();
            }

            // ===== БЛОКИРОВКА КАРТЫ (без изменений) =====
            async function blockCard(cardId, reason, duration, unit) {
                const card = cards.find(c => c.id === cardId);
                if (!card) return;
                let expiry = null;
                if (duration !== 'forever') {
                    const d = new Date();
                    if (unit === 'min') d.setMinutes(d.getMinutes() + parseInt(duration));
                    else if (unit === 'hour') d.setHours(d.getHours() + parseInt(duration));
                    else if (unit === 'day') d.setDate(d.getDate() + parseInt(duration));
                    else if (unit === 'month') d.setMonth(d.getMonth() + parseInt(duration));
                    else if (unit === 'year') d.setFullYear(d.getFullYear() + parseInt(duration));
                    expiry = d.toISOString();
                } else expiry = 'forever';
                card.blocked = true;
                card.blockReason = reason;
                card.blockExpiry = expiry;
                const user = getUser(card.userId);
                if (user && wallets[user.id]) {
                    wallets[user.id].blocked = true;
                    wallets[user.id].blockReason = reason;
                    wallets[user.id].blockExpiry = expiry;
                }
                await saveAll();
                showToast('🔒 Карта заблокирована');
                addNotif(card.userId, '🔒 Карта заблокирована', `Причина: ${reason}. Срок: ${expiry}`);
            }

            // ===== АВТОМАТИЧЕСКИЙ БАН (без изменений) =====
            async function checkDebtsAndBan() {
                const nowDate = new Date();
                for (const debt of debts) {
                    if (debt.paid) continue;
                    const debtDate = new Date(debt.date);
                    const diffDays = Math.floor((nowDate - debtDate) / (1000 * 60 * 60 * 24));
                    if (diffDays > 7) {
                        const user = getUser(debt.userId);
                        if (user && !user.banned) {
                            user.banned = true;
                            user.banReason = 'Просрочка долга более 7 дней';
                            user.banExpiry = 'forever';
                            addNotif(debt.userId, '🚫 Аккаунт заблокирован', 'Ваш аккаунт заблокирован за просрочку долга');
                            await saveAll();
                            showToast('🚫 Пользователь забанен за долг');
                        }
                    }
                }
            }

            // ===== ЗАГРУЗКА (без изменений) =====
            async function loadAll() {
                try {
                    const uData = await readBin(USERS_BIN_ID);
                    users = uData.users || [];
                    const oData = await readBin(ORDERS_BIN_ID);
                    orders = oData.orders || { food: [], cleaning: [], massage: [], legal: [], court: [], applications: [], vacancies: [], pendingVacancies: [], roomVisits: [] };
                    if (!orders.roomVisits) orders.roomVisits = [];
                    notifications = oData.notifications || [];
                    supportTickets = oData.supportTickets || [];
                    chats = oData.chats || {};
                    messages = oData.messages || {};
                    stickers = oData.stickers || {};
                    roles = oData.roles || [];
                    statuses = oData.statuses || [];
                    wallets = oData.wallets || {};
                    businessAccounts = oData.businessAccounts || {};
                    promoCodes = oData.promoCodes || [];
                    subscriptions = oData.subscriptions || [];
                    debts = oData.debts || [];
                    cards = oData.cards || [];
                    topUpRequests = oData.topUpRequests || [];

                    users.forEach(u => {
                        if (!wallets[u.id]) {
                            wallets[u.id] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
                        }
                    });
                    if (wallets['00000']) wallets['00000'].balance = 999999999;

                    const adminExists = users.some(u => u.id === '00000');
                    if (!adminExists) {
                        users.push({ id: '00000', fio: 'Администратор', email: 'admin@ad.systems', password: '31441537a', role: 'admin', status: 'Администратор', roles: [], avatar: '', bio: '', phone: '', banned: false, banReason: '', banExpiry: null, walletId: '00000', cardId: '', businessName: '', masterService: '', commission: 30 });
                        if (!wallets['00000']) wallets['00000'] = { balance: 999999999, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
                        await saveAll();
                    }
                    await checkDebtsAndBan();

                    const session = sessionStorage.getItem('ad_session');
                    if (session) {
                        const p = JSON.parse(session);
                        const u = users.find(x => x.id === p.id);
                        if (u && !isBanned(u)) { currentUser = u; showMain(); return; }
                    }
                    if (!checkRemember()) showAuth();
                } catch (e) { console.error(e); showToast('❌ Ошибка загрузки'); showAuth(); }
            }

            async function saveAll() {
                await writeBin(USERS_BIN_ID, { users });
                await writeBin(ORDERS_BIN_ID, {
                    orders, notifications, supportTickets, chats, messages, stickers, roles, statuses,
                    wallets, businessAccounts, promoCodes, subscriptions, debts, cards, topUpRequests
                });
            }

            // ===== АВТОРИЗАЦИЯ (без изменений) =====
            document.querySelectorAll('[data-tab]').forEach(b => {
                b.addEventListener('click', function() {
                    document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.auth-form').forEach(x => x.classList.remove('active'));
                    document.getElementById('form' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1)).classList.add('active');
                });
            });

            document.getElementById('loginForm').addEventListener('submit', function(e) { /* ... */ });
            document.getElementById('registerForm').addEventListener('submit', async function(e) { /* ... */ });
            function checkRemember() { /* ... */ }

            // ===== НАВИГАЦИЯ (без изменений) =====
            function showAuth() { /* ... */ }
            function showMain() { /* ... */ }
            function showPanel(panelId) { /* ... */ }
            function goBack() { /* ... */ }

            document.addEventListener('click', function(e) {
                const backBtn = e.target.closest('[data-back]');
                if (backBtn) { e.preventDefault(); goBack(); }
                const logoutBtn = e.target.closest('#logoutBtn');
                if (logoutBtn) {
                    sessionStorage.removeItem('ad_session');
                    localStorage.removeItem('ad_remember');
                    currentUser = null;
                    showAuth();
                    document.getElementById('mainPage').classList.remove('active');
                    document.getElementById('panelsContainer').classList.remove('active');
                }
            });

            // ===== ГЕНЕРАЦИЯ СЕКЦИЙ (без изменений) =====
            const sections = [ /* ... */ ];
            function generateSections() { /* ... */ }

            // ============================================================
            // ПОСЕЩЕНИЕ КОМНАТЫ (пользователь) — без изменений
            // ============================================================
            function renderRoomVisit() {
                const container = document.getElementById('roomVisitContainer');
                if (!orders.roomVisits) orders.roomVisits = [];
                const items = orders.roomVisits.filter(v => v.userId === currentUser.id);
                if (!items.length) { container.innerHTML = '<div class="empty-state">Нет заявок</div>'; return; }
                container.innerHTML = items.map(v => {
                    let statusHtml = '';
                    if (v.status === 'pending') statusHtml = '<span class="card-status status-pending">⏳ Ожидает</span>';
                    else if (v.status === 'approved') statusHtml = '<span class="card-status status-approved">✅ Одобрено</span>';
                    else if (v.status === 'rejected') statusHtml = '<span class="card-status status-rejected">❌ Отклонено</span>';
                    else if (v.status === 'completed') statusHtml = '<span class="card-status status-done">✅ Завершено</span>';
                    else if (v.status === 'active') statusHtml = '<span class="card-status status-processing">🔄 Идёт посещение</span>';
                    return `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-id">${v.id}</span>
                                ${statusHtml}
                            </div>
                            <div class="card-detail"><strong>Цель:</strong> ${v.purpose}</div>
                            <div class="card-detail"><strong>Дата:</strong> ${v.date}</div>
                            <div class="card-detail"><strong>Время:</strong> ${v.time}</div>
                            ${v.adminComment ? `<div class="card-detail" style="color:#b8962e;"><strong>Комментарий админа:</strong> ${v.adminComment}</div>` : ''}
                            ${v.rejectReason ? `<div class="card-detail" style="color:#a14f4f;"><strong>Причина отказа:</strong> ${v.rejectReason}</div>` : ''}
                            <div class="card-detail" style="font-size:0.7rem;color:#8b97a8;">${v.timeCreated}</div>
                            ${v.status === 'approved' ? `
                                <div style="margin-top:0.5rem;">
                                    <p><strong>Ваш QR-код для входа:</strong></p>
                                    <div id="qrContainerRoomVisit_${v.id}" style="display:flex;justify-content:center;margin:0.5rem 0;"></div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                items.filter(v => v.status === 'approved').forEach(v => {
                    setTimeout(() => generateRoomVisitQR(v.id), 200);
                });
            }

            // ============================================================
            // ОБРАБОТЧИКИ ДЛЯ МОДАЛОК (без изменений)
            // ============================================================
            document.addEventListener('click', function(e) {
                const roomVisitBtn = e.target.closest('#btnRoomVisitRequest');
                if (roomVisitBtn) { e.preventDefault(); openModal('modalRoomVisitRequest'); }
                const closeRoomVisit = e.target.closest('#closeRoomVisitRequest');
                if (closeRoomVisit) { e.preventDefault(); closeModal('modalRoomVisitRequest'); }
                const closeRoomVisitEdit = e.target.closest('#closeRoomVisitEdit');
                if (closeRoomVisitEdit) { e.preventDefault(); closeModal('modalRoomVisitEdit'); }
                const closeRoomVisitScan = e.target.closest('#closeRoomVisitScan');
                if (closeRoomVisitScan) { e.preventDefault(); closeModal('modalRoomVisitScan'); }
                // ... другие модалки (food, cleaning и т.д.) — они уже есть в коде
            });

            document.getElementById('formRoomVisitRequest').addEventListener('submit', async function(e) {
                e.preventDefault();
                const purpose = document.getElementById('roomVisitPurpose').value.trim();
                const date = document.getElementById('roomVisitDate').value;
                const time = document.getElementById('roomVisitTime').value;
                if (!purpose || !date || !time) return alert('Заполните все поля');
                orders.roomVisits.push({
                    id: genSid('RV'),
                    userId: currentUser.id,
                    userFio: currentUser.fio,
                    purpose,
                    date,
                    time,
                    status: 'pending',
                    adminComment: '',
                    rejectReason: '',
                    timeCreated: now(),
                    startTime: null,
                    endTime: null
                });
                await saveAll();
                renderAll();
                showToast('✅ Заявка на посещение отправлена!');
                closeModal('modalRoomVisitRequest');
                this.reset();
            });

            document.getElementById('formRoomVisitEdit').addEventListener('submit', async function(e) {
                e.preventDefault();
                const id = document.getElementById('roomVisitEditId').value;
                const purpose = document.getElementById('roomVisitEditPurpose').value.trim();
                const date = document.getElementById('roomVisitEditDate').value;
                const time = document.getElementById('roomVisitEditTime').value;
                if (!purpose || !date || !time) return alert('Заполните все поля');
                const visit = orders.roomVisits.find(v => v.id === id);
                if (visit) {
                    visit.purpose = purpose;
                    visit.date = date;
                    visit.time = time;
                    visit.adminComment = 'Отредактировано администратором';
                    await saveAll();
                    renderAdmin();
                    showToast('✅ Заявка обновлена');
                    closeModal('modalRoomVisitEdit');
                }
            });

            // ============================================================
            // АДМИН-ПАНЕЛЬ (полностью переписана на делегирование)
            // ============================================================
            // Глобальный обработчик для всех кликов в админ-контенте
            document.addEventListener('click', function(e) {
                const target = e.target.closest('#adminContent');
                if (!target) return;

                // === Обработка кнопок вкладок админ-панели ===
                const tabBtn = e.target.closest('[id^="adminTab"]');
                if (tabBtn) {
                    const tabId = tabBtn.id.replace('adminTab', '').toLowerCase();
                    adminCurrentTab = tabId;
                    renderAdmin();
                    e.preventDefault();
                    return;
                }

                // === Кнопки в заказах (approve/reject) ===
                const approveBtn = e.target.closest('.admin-approve-btn');
                if (approveBtn) {
                    const orderId = approveBtn.dataset.orderId;
                    const input = document.querySelector(`.admin-price-input[data-order-id="${orderId}"]`);
                    const price = parseFloat(input?.value);
                    if (isNaN(price) || price <= 0) {
                        showToast('❌ Введите корректную цену');
                        return;
                    }
                    let order = null;
                    for (const key in orders) {
                        if (Array.isArray(orders[key])) {
                            const found = orders[key].find(o => o.id === orderId);
                            if (found) { order = found; break; }
                        }
                    }
                    if (!order) { showToast('❌ Заказ не найден'); return; }
                    const wallet = getWallet(order.userId);
                    if (wallet.balance < price) {
                        order.status = 'rejected';
                        order.rejectReason = `Недостаточно средств. Требуется: ${price} ₽`;
                        order.price = price;
                        saveAll().then(() => {
                            renderAdmin();
                            showToast(`❌ Заказ отклонён: недостаточно средств (${price} ₽)`);
                        });
                        return;
                    }
                    processTransaction(order.userId, '00000', price, `Оплата заказа ${order.id}`).then(success => {
                        if (success) {
                            order.status = 'approved';
                            order.price = price;
                            order.adminComment = 'Одобрено администратором';
                            saveAll().then(() => {
                                renderAdmin();
                                showToast('✅ Заказ одобрен и оплачен');
                            });
                        } else {
                            order.status = 'rejected';
                            order.rejectReason = 'Ошибка оплаты';
                            saveAll().then(() => {
                                renderAdmin();
                                showToast('❌ Ошибка оплаты');
                            });
                        }
                    });
                    e.preventDefault();
                }

                const rejectBtn = e.target.closest('.admin-reject-btn');
                if (rejectBtn) {
                    const orderId = rejectBtn.dataset.orderId;
                    const reason = prompt('Причина отказа:');
                    if (reason === null) return;
                    let order = null;
                    for (const key in orders) {
                        if (Array.isArray(orders[key])) {
                            const found = orders[key].find(o => o.id === orderId);
                            if (found) { order = found; break; }
                        }
                    }
                    if (!order) { showToast('❌ Заказ не найден'); return; }
                    order.status = 'rejected';
                    order.rejectReason = reason || 'Отклонено администратором';
                    saveAll().then(() => {
                        renderAdmin();
                        showToast('❌ Заказ отклонён');
                    });
                    e.preventDefault();
                }

                // === Посещения (редактировать, одобрить, отклонить, сканировать, завершить) ===
                const editVisit = e.target.closest('[data-roomvisit-edit]');
                if (editVisit) {
                    const id = editVisit.dataset.roomvisitEdit;
                    const visit = orders.roomVisits.find(v => v.id === id);
                    if (visit) {
                        document.getElementById('roomVisitEditId').value = id;
                        document.getElementById('roomVisitEditPurpose').value = visit.purpose;
                        document.getElementById('roomVisitEditDate').value = visit.date;
                        document.getElementById('roomVisitEditTime').value = visit.time;
                        openModal('modalRoomVisitEdit');
                    }
                    e.preventDefault();
                }

                const approveVisit = e.target.closest('[data-roomvisit-approve]');
                if (approveVisit) {
                    const id = approveVisit.dataset.roomvisitApprove;
                    const visit = orders.roomVisits.find(v => v.id === id);
                    if (visit) {
                        visit.status = 'approved';
                        visit.adminComment = 'Одобрено администратором';
                        saveAll().then(() => {
                            renderAdmin();
                            showToast('✅ Заявка одобрена');
                        });
                    }
                    e.preventDefault();
                }

                const rejectVisit = e.target.closest('[data-roomvisit-reject]');
                if (rejectVisit) {
                    const id = rejectVisit.dataset.roomvisitReject;
                    const visit = orders.roomVisits.find(v => v.id === id);
                    if (visit) {
                        const reason = prompt('Причина отказа:');
                        if (reason !== null) {
                            visit.status = 'rejected';
                            visit.rejectReason = reason || 'Отклонено администратором';
                            saveAll().then(() => {
                                renderAdmin();
                                showToast('❌ Заявка отклонена');
                            });
                        }
                    }
                    e.preventDefault();
                }

                const scanVisit = e.target.closest('[data-roomvisit-scan]');
                if (scanVisit) {
                    const id = scanVisit.dataset.roomvisitScan;
                    roomVisitScanTarget = id;
                    openModal('modalRoomVisitScan');
                    startRoomVisitScanner();
                    e.preventDefault();
                }

                const finishVisit = e.target.closest('[data-roomvisit-finish]');
                if (finishVisit) {
                    const id = finishVisit.dataset.roomvisitFinish;
                    const visit = orders.roomVisits.find(v => v.id === id);
                    if (visit) {
                        visit.status = 'completed';
                        visit.endTime = now();
                        addNotif(visit.userId, '✅ Посещение завершено', `Ваше посещение комнаты ${visit.id} завершено`);
                        saveAll().then(() => {
                            renderAdmin();
                            showToast('⏹️ Посещение завершено');
                        });
                    }
                    e.preventDefault();
                }

                // Кнопка "Сканировать QR" в админке (общая)
                const scanBtn = e.target.closest('#adminRoomVisitScanBtn');
                if (scanBtn) {
                    roomVisitScanTarget = null;
                    openModal('modalRoomVisitScan');
                    startRoomVisitScanner();
                    e.preventDefault();
                }

                // === Кнопки пользователей (бан, разбан, управление) ===
                const userBtn = e.target.closest('[data-user]');
                if (userBtn) {
                    const uid = userBtn.dataset.user;
                    const user = users.find(x => x.id === uid);
                    if (user) openUserManage(user);
                    e.preventDefault();
                }

                const banBtn = e.target.closest('[data-ban]');
                if (banBtn) {
                    const uid = banBtn.dataset.ban;
                    const user = users.find(x => x.id === uid);
                    if (user) { banTarget = user; openModal('modalBan'); }
                    e.preventDefault();
                }

                const unbanBtn = e.target.closest('[data-unban]');
                if (unbanBtn) {
                    const uid = unbanBtn.dataset.unban;
                    const user = users.find(x => x.id === uid);
                    if (user && isBanned(user)) {
                        user.banned = false; user.banReason = ''; user.banExpiry = null;
                        saveAll().then(() => {
                            addNotif(user.id, '🔓 Аккаунт разблокирован', 'Ваш аккаунт разблокирован администратором');
                            showToast('🔓 Пользователь разблокирован');
                            renderAdmin();
                        });
                    }
                    e.preventDefault();
                }

                // === Поддержка (ответить, закрыть) ===
                const supportReply = e.target.closest('[data-support-reply]');
                if (supportReply) {
                    const idx = parseInt(supportReply.dataset.supportReply);
                    supportReplyTarget = idx;
                    openModal('modalSupportReply');
                    e.preventDefault();
                }

                const supportResolve = e.target.closest('[data-support-resolve]');
                if (supportResolve) {
                    const idx = parseInt(supportResolve.dataset.supportResolve);
                    if (supportTickets[idx]) {
                        supportTickets[idx].status = 'resolved';
                        saveAll().then(() => {
                            renderAdmin();
                            showToast('✅ Обращение закрыто');
                        });
                    }
                    e.preventDefault();
                }
            });

            // ===== ФУНКЦИИ РЕНДЕРА АДМИН-ВКЛАДОК =====
            function renderAdmin() {
                if (currentUser.role !== 'admin') return;
                const container = document.getElementById('adminContent');
                switch (adminCurrentTab) {
                    case 'applications': renderAdminApplications(container); break;
                    case 'users': renderAdminUsers(container); break;
                    case 'support': renderAdminSupport(container); break;
                    case 'wallets': renderAdminWallets(container); break;
                    case 'business': renderAdminBusiness(container); break;
                    case 'promocodes': renderAdminPromoCodes(container); break;
                    case 'subscriptions': renderAdminSubscriptions(container); break;
                    case 'topuprequests': renderAdminTopUpRequests(container); break;
                    case 'cards': renderAdminCards(container); break;
                    case 'roomvisits': renderAdminRoomVisits(container); break;
                    case 'history': renderHistory(); break;
                    default: renderAdminApplications(container);
                }
            }

            function renderAdminApplications(container) {
                let allOrders = [];
                orders.food.forEach(o => allOrders.push({ ...o, typeLabel: '🍕 Еда' }));
                orders.cleaning.forEach(o => allOrders.push({ ...o, typeLabel: '🧹 Уборка' }));
                orders.massage.forEach(o => allOrders.push({ ...o, typeLabel: '💆 Массаж' }));
                orders.legal.forEach(o => allOrders.push({ ...o, typeLabel: '⚖️ Консультация' }));
                orders.court.forEach(o => allOrders.push({ ...o, typeLabel: '🏛️ Суд' }));

                const pending = allOrders.filter(o => o.status === 'pending');
                const processed = allOrders.filter(o => o.status !== 'pending');

                if (!pending.length && !processed.length) {
                    container.innerHTML = `<div class="empty-state">Нет заказов</div>`;
                    return;
                }

                let html = `<h3>📋 Новые заявки (ожидают решения)</h3><div class="cards-grid">`;
                pending.forEach(o => {
                    html += `
                        <div class="card">
                            <div class="card-header"><span class="card-id">${o.id}</span><span class="card-status status-pending">⏳ Ожидает</span></div>
                            <div class="card-detail"><strong>Тип:</strong> ${o.typeLabel}</div>
                            <div class="card-detail"><strong>Пользователь:</strong> ${o.userFio} (${o.userId})</div>
                            <div class="card-detail"><strong>Детали:</strong> ${o.dish || o.room || o.topic || o.reason || ''}</div>
                            <div class="card-detail" style="font-size:0.7rem;color:#8b97a8;">${o.time}</div>
                            <div style="margin-top:0.5rem;">
                                <label>Цена (₽):</label>
                                <input type="number" class="admin-price-input" data-order-id="${o.id}" placeholder="Введите сумму" min="0" style="width:120px;padding:4px 8px;border-radius:12px;border:1px solid #d0d7e2;">
                                <button class="btn-sm green admin-approve-btn" data-order-id="${o.id}">✅ Одобрить</button>
                                <button class="btn-sm danger admin-reject-btn" data-order-id="${o.id}">❌ Отклонить</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;

                html += `<h3 style="margin-top:2rem;">📋 Обработанные заказы</h3><div class="cards-grid">`;
                processed.forEach(o => {
                    const statusClass = o.status === 'approved' ? 'status-approved' : 'status-rejected';
                    const statusText = o.status === 'approved' ? '✅ Одобрен' : '❌ Отклонён';
                    html += `
                        <div class="card">
                            <div class="card-header"><span class="card-id">${o.id}</span><span class="card-status ${statusClass}">${statusText}</span></div>
                            <div class="card-detail"><strong>Тип:</strong> ${o.typeLabel}</div>
                            <div class="card-detail"><strong>Пользователь:</strong> ${o.userFio} (${o.userId})</div>
                            <div class="card-detail"><strong>Цена:</strong> ${o.price !== null ? o.price + ' ₽' : '—'}</div>
                            ${o.rejectReason ? `<div class="card-detail" style="color:#a14f4f;"><strong>Причина:</strong> ${o.rejectReason}</div>` : ''}
                            ${o.adminComment ? `<div class="card-detail" style="color:#b8962e;"><strong>Комментарий:</strong> ${o.adminComment}</div>` : ''}
                            <div class="card-detail" style="font-size:0.7rem;color:#8b97a8;">${o.time}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                container.innerHTML = html;
            }

            function renderAdminRoomVisits(container) {
                const visits = orders.roomVisits || [];
                if (!visits.length) { container.innerHTML = '<div class="empty-state">Нет заявок на посещение</div>'; return; }
                let html = `
                    <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
                        <button class="btn-sm blue" id="adminRoomVisitScanBtn">📷 Сканировать QR</button>
                    </div>
                    <div class="cards-grid">
                `;
                visits.forEach(v => {
                    let statusText = '';
                    let statusClass = '';
                    if (v.status === 'pending') { statusText = '⏳ Ожидает'; statusClass = 'pending'; }
                    else if (v.status === 'approved') { statusText = '✅ Одобрено'; statusClass = 'approved'; }
                    else if (v.status === 'rejected') { statusText = '❌ Отклонено'; statusClass = 'rejected'; }
                    else if (v.status === 'completed') { statusText = '✅ Завершено'; statusClass = 'done'; }
                    else if (v.status === 'active') { statusText = '🔄 Активно'; statusClass = 'processing'; }
                    html += `
                        <div class="card">
                            <div class="card-header">
                                <span class="card-id">${v.id}</span>
                                <span class="card-status status-${statusClass}">${statusText}</span>
                            </div>
                            <div class="card-detail"><strong>Пользователь:</strong> ${v.userFio} (${v.userId})</div>
                            <div class="card-detail"><strong>Цель:</strong> ${v.purpose}</div>
                            <div class="card-detail"><strong>Дата:</strong> ${v.date}</div>
                            <div class="card-detail"><strong>Время:</strong> ${v.time}</div>
                            ${v.adminComment ? `<div class="card-detail" style="color:#b8962e;"><strong>Комментарий:</strong> ${v.adminComment}</div>` : ''}
                            ${v.rejectReason ? `<div class="card-detail" style="color:#a14f4f;"><strong>Причина отказа:</strong> ${v.rejectReason}</div>` : ''}
                            <div class="card-detail" style="font-size:0.7rem;color:#8b97a8;">${v.timeCreated}</div>
                            <div class="card-actions">
                                ${v.status === 'pending' ? `
                                    <button class="btn-sm gold" data-roomvisit-edit="${v.id}">✏️ Редактировать</button>
                                    <button class="btn-sm green" data-roomvisit-approve="${v.id}">✅ Одобрить</button>
                                    <button class="btn-sm danger" data-roomvisit-reject="${v.id}">❌ Отклонить</button>
                                ` : ''}
                                ${v.status === 'approved' ? `
                                    <button class="btn-sm blue" data-roomvisit-scan="${v.id}">📷 Сканировать QR</button>
                                ` : ''}
                                ${v.status === 'active' ? `
                                    <button class="btn-sm green" data-roomvisit-finish="${v.id}">⏹️ Завершить</button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            }

            function renderAdminUsers(container) {
                container.innerHTML = `
                    <div class="search-box"><input type="text" id="adminUserSearch" placeholder="Поиск..."><button id="adminUserSearchBtn">🔍</button></div>
                    <div id="adminSearchResult"></div>
                    <div class="cards-grid">${users.map(u => `
                        <div class="card">
                            <div class="card-header"><span class="card-id">${u.id}</span><span style="font-size:0.7rem;color:${u.role === 'admin' ? '#b8962e' : '#8b97a8'};">${u.role || 'user'}</span></div>
                            <div class="card-detail"><strong>${u.fio}</strong></div>
                            <div class="card-detail">${u.email}</div>
                            ${isBanned(u) ? `<div class="card-detail" style="color:#a14f4f;">🚫 Забанен</div>` : ''}
                            <div class="card-actions">
                                <button class="btn-sm gold" data-user="${u.id}">👤</button>
                                ${u.id !== '00000' ? `<button class="btn-sm danger" data-ban="${u.id}">🚫</button>` : ''}
                                ${isBanned(u) ? `<button class="btn-sm green" data-unban="${u.id}">🔓</button>` : ''}
                            </div>
                        </div>
                    `).join('')}</div>
                `;
            }

            function renderAdminSupport(container) {
                const tickets = supportTickets.filter(t => t.status !== 'resolved' || t.adminReply);
                if (!tickets.length) { container.innerHTML = '<div class="empty-state">Нет обращений</div>'; return; }
                container.innerHTML = tickets.map((t, idx) => `
                    <div class="card">
                        <div class="card-header"><span class="card-id">${t.id}</span><span class="card-status status-${t.status === 'resolved' ? 'done' : 'new'}">${t.status === 'resolved' ? '✅' : '🆕'}</span></div>
                        <div class="card-detail"><strong>От:</strong> ${t.userFio} (${t.userId})</div>
                        <div class="card-detail"><strong>Проблема:</strong> ${t.problem}</div>
                        <div class="card-detail"><strong>Срочность:</strong> ${t.urgency}</div>
                        <div class="card-detail" style="font-size:0.7rem;">${t.time}</div>
                        ${t.adminReply ? `<div class="card-detail" style="color:#b8962e;"><strong>Ответ:</strong> ${t.adminReply}</div>` : ''}
                        <div class="card-actions">
                            ${!t.adminReply ? `<button class="btn-sm gold" data-support-reply="${idx}">💬</button>` : ''}
                            <button class="btn-sm green" data-support-resolve="${idx}">✅</button>
                        </div>
                    </div>
                `).join('');
            }

            function renderAdminWallets(container) { container.innerHTML = `<div class="empty-state">💰 Управление кошельками — в разработке</div>`; }
            function renderAdminBusiness(container) { container.innerHTML = `<div class="empty-state">🏢 Бизнес-счета — в разработке</div>`; }
            function renderAdminPromoCodes(container) { container.innerHTML = `<div class="empty-state">🎫 Промокоды — в разработке</div>`; }
            function renderAdminSubscriptions(container) { container.innerHTML = `<div class="empty-state">📅 Абонементы — в разработке</div>`; }
            function renderAdminTopUpRequests(container) { container.innerHTML = `<div class="empty-state">📩 Запросы на пополнение — в разработке</div>`; }
            function renderAdminCards(container) { container.innerHTML = `<div class="empty-state">💳 Управление картами — в разработке</div>`; }

            // ===== ИСТОРИЯ (без изменений) =====
            function renderHistory() {
                // ... (код из предыдущей версии)
            }

            // ===== ОТКРЫТИЕ УПРАВЛЕНИЯ ПОЛЬЗОВАТЕЛЕМ =====
            function openUserManage(user) {
                // ... (код из предыдущей версии)
            }

            // ===== СКАНЕР QR ДЛЯ ПОСЕЩЕНИЯ =====
            function startRoomVisitScanner() {
                // ... (код из предыдущей версии)
            }

            // ============================================================
            // ОСТАЛЬНЫЕ РЕНДЕРЫ (заглушки)
            // ============================================================
            function renderFood() { /* ... */ }
            function renderCleaning() { /* ... */ }
            // ... все остальные

            function renderAll() {
                if (document.getElementById('foodContainer')) renderFood();
                if (document.getElementById('workVacancies')) renderVacancies();
                if (document.getElementById('workApplications')) renderApplications();
                if (document.getElementById('cleaningContainer')) renderCleaning();
                if (document.getElementById('massageContainer')) renderMassage();
                if (document.getElementById('legalContainer')) renderLegal();
                if (document.getElementById('courtContainer')) renderCourt();
                if (document.getElementById('roomVisitContainer')) renderRoomVisit();
                if (currentUser.role === 'admin') renderAdmin();
            }

            // ============================================================
            // ЗАПУСК
            // ============================================================
            document.addEventListener('DOMContentLoaded', function() {
                loadAll();
            });

        })();
    </script>
</body>
</html>
