<script>
(function() {
    'use strict';

    // ===== КОНФИГ =====
    const JSONBIN_MASTER_KEY = '$2a$10$xTc.g/ovT7T19WYv9xu8f.URPVCegAY7Atr4bUFhjd96e7vgTXVd6';
    const USERS_BIN_ID = '6a57a81bf5f4af5e29933029';
    const ORDERS_BIN_ID = '6a57a8b9f5f4af5e29933361';

    // ===== API =====
    async function readBin(id) {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, { headers: { 'X-Master-Key': JSONBIN_MASTER_KEY } });
        if (!r.ok) throw new Error('Ошибка чтения');
        return (await r.json()).record || {};
    }
    async function writeBin(id, data) {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_MASTER_KEY },
            body: JSON.stringify(data)
        });
        if (!r.ok) throw new Error('Ошибка записи');
        return await r.json();
    }

    // ===== ДАННЫЕ =====
    let users = [], currentUser = null;
    let orders = { food: [], cleaning: [], massage: [], legal: [], court: [], applications: [], vacancies: [], pendingVacancies: [], roomVisits: [] };
    let notifications = [], supportTickets = [], chats = {}, messages = {}, stickers = [], roles = [], statuses = [];
    let wallets = {}, businessAccounts = {}, promoCodes = [], subscriptions = [], debts = [], cards = [], topUpRequests = [];
    let adminCurrentTab = 'applications';
    let rejectTarget = null, approveTarget = null, banTarget = null, statusChangeTarget = null, courtResponseTarget = null, supportReplyTarget = null;
    let currentChatId = null, scanner = null, roomVisitEditTarget = null, roomVisitScanTarget = null;

    // ===== ВСПОМОГАТЕЛЬНЫЕ =====
    function generateId() { let id, e; do { id = String(Math.floor(10000 + Math.random() * 90000)); e = users.some(u => u.id === id); } while (e); return id; }
    function genSid(p) { return p + '-' + String(Math.floor(1000 + Math.random() * 9000)); }
    function statusText(s) { const map = { 'new': 'Новый', 'cooking': 'Готовится', 'delivering': 'В пути', 'done': 'Выполнено', 'active': 'Активна', 'closed': 'Закрыта', 'accepted': 'Принят', 'rejected': 'Отклонён', 'processing': 'В работе', 'pending': 'На модерации', 'cancelled': 'Отменён', 'approved': 'Одобрено', 'denied': 'Отказано', 'completed': 'Завершено' }; return map[s] || s; }
    function statusClass(s) { const map = { 'new': 'new', 'cooking': 'processing', 'delivering': 'processing', 'done': 'done', 'active': 'active', 'closed': 'closed', 'accepted': 'accepted', 'rejected': 'rejected', 'processing': 'processing', 'pending': 'pending', 'cancelled': 'cancelled', 'approved': 'approved', 'denied': 'denied', 'completed': 'done' }; return map[s] || 'new'; }
    function now() { return new Date().toLocaleString('ru-RU', { hour12: false }); }
    function showToast(msg) { const e = document.getElementById('toast'); e.innerHTML = msg; e.classList.add('show'); clearTimeout(window.tt); window.tt = setTimeout(() => e.classList.remove('show'), 3000); }
    function openModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'flex'; }
    function closeModal(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
    function isBanned(u) { if (!u || !u.banned) return false; if (u.banExpiry && u.banExpiry !== 'forever') { if (new Date(u.banExpiry) > new Date()) return true; u.banned = false; u.banReason = ''; u.banExpiry = null; saveAll(); return false; } return u.banExpiry === 'forever' || u.banned === true; }
    function getBanInfo(u) { if (!u || !u.banned) return null; if (u.banExpiry === 'forever') return { reason: u.banReason, expiry: 'навсегда' }; if (u.banExpiry) { const d = new Date(u.banExpiry); if (d > new Date()) return { reason: u.banReason, expiry: d.toLocaleString('ru-RU') }; u.banned = false; u.banReason = ''; u.banExpiry = null; saveAll(); return null; } return null; }
    function addNotif(userId, title, msg, comment = '', reason = '') { notifications.unshift({ id: genSid('NT'), userId, title, message: msg, comment, reason, time: now(), read: false }); saveAll(); }
    function getUser(id) { return users.find(u => u.id === id); }
    function getWallet(userId) { if (!wallets[userId]) wallets[userId] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] }; return wallets[userId]; }

    // ===== ТРАНЗАКЦИИ =====
    async function processTransaction(fromUserId, toUserId, amount, description, type = 'payment') {
        const fromW = getWallet(fromUserId);
        const toW = getWallet(toUserId);
        if (!fromW || !toW) { showToast('❌ Ошибка: кошелёк не найден'); return false; }
        if (fromW.blocked) { showToast('❌ Ваша карта заблокирована'); return false; }
        if (fromW.balance < amount) { showToast('❌ Недостаточно средств'); return false; }
        fromW.balance -= amount;
        toW.balance += amount;
        const txn = { id: 'txn_' + Date.now(), type, amount, description, from: fromUserId, to: toUserId, time: now() };
        fromW.transactions.push(txn);
        toW.transactions.push(txn);
        await saveAll();
        addNotif(fromUserId, '💳 Оплата', `Списано ${amount} ₽. ${description}`);
        addNotif(toUserId, '💰 Поступление', `Получено ${amount} ₽. ${description}`);
        return true;
    }

    // ===== ПРОМОКОДЫ =====
    function applyPromo(code, userId, service) {
        const promo = promoCodes.find(p => p.code.toUpperCase() === code.toUpperCase());
        if (!promo) { showToast('❌ Промокод не найден'); return null; }
        if (new Date(promo.validUntil) < new Date()) { showToast('❌ Промокод истёк'); return null; }
        if (promo.usedCount >= promo.maxActivations) { showToast('❌ Промокод исчерпан'); return null; }
        if (promo.usedBy.includes(userId)) { showToast('❌ Вы уже использовали этот промокод'); return null; }
        if (promo.service !== 'all' && promo.service !== service) { showToast('❌ Промокод не подходит для этой услуги'); return null; }
        promo.usedCount++;
        promo.usedBy.push(userId);
        saveAll();
        return promo.discount;
    }

    // ===== АБОНЕМЕНТЫ =====
    function hasSubscription(userId, service) {
        return subscriptions.find(s => s.userId === userId && s.service === service && new Date(s.validUntil) > new Date() && s.remainingSessions > 0) || null;
    }
    async function useSubscription(userId, service) {
        const sub = hasSubscription(userId, service);
        if (sub) { sub.remainingSessions--; await saveAll(); return true; }
        return false;
    }

    // ===== ВЫПУСК КАРТЫ =====
    async function issueCard(userId) {
        const user = getUser(userId);
        if (!user) return alert('Пользователь не найден');
        let number = '';
        for (let i = 0; i < 16; i++) {
            number += Math.floor(Math.random() * 10);
            if (i === 3 || i === 7 || i === 11) number += ' ';
        }
        const card = { id: 'card_' + Date.now(), userId: userId, cardNumber: number, qrCode: '', issued: now(), blocked: false, blockReason: '', blockExpiry: null };
        cards.push(card);
        user.cardId = card.id;
        if (wallets[userId]) wallets[userId].cardNumber = number;
        await saveAll();
        showToast('✅ Карта выпущена!');
        renderAll();
    }

    // ===== БЛОКИРОВКА КАРТЫ =====
    async function blockCard(cardId, reason, duration, unit) {
        const card = cards.find(c => c.id === cardId);
        if (!card) return;
        let expiry = null;
        if (duration !== 'forever') {
            const d = new Date();
            if (unit === 'min') d.setMinutes(d.getMinutes() + parseInt(duration));
            else if (unit === 'hour') d.setHours(d.getHours() + parseInt(duration));
            else if (unit === 'day') d.setDate(d.getDate() + parseInt(duration));
            else if (unit === 'month') d.setMonth(d.getMonth() + parseInt(duration));
            else if (unit === 'year') d.setFullYear(d.getFullYear() + parseInt(duration));
            expiry = d.toISOString();
        } else expiry = 'forever';
        card.blocked = true;
        card.blockReason = reason;
        card.blockExpiry = expiry;
        const user = getUser(card.userId);
        if (user && wallets[user.id]) {
            wallets[user.id].blocked = true;
            wallets[user.id].blockReason = reason;
            wallets[user.id].blockExpiry = expiry;
        }
        await saveAll();
        showToast('🔒 Карта заблокирована');
        addNotif(card.userId, '🔒 Карта заблокирована', `Причина: ${reason}. Срок: ${expiry}`);
    }

    // ===== ЗАГРУЗКА =====
    async function loadAll() {
        try {
            const uData = await readBin(USERS_BIN_ID);
            users = uData.users || [];
            const oData = await readBin(ORDERS_BIN_ID);
            orders = oData.orders || { food: [], cleaning: [], massage: [], legal: [], court: [], applications: [], vacancies: [], pendingVacancies: [], roomVisits: [] };
            if (!orders.roomVisits) orders.roomVisits = [];
            notifications = oData.notifications || [];
            supportTickets = oData.supportTickets || [];
            chats = oData.chats || {};
            messages = oData.messages || {};
            stickers = oData.stickers || [];
            roles = oData.roles || [];
            statuses = oData.statuses || [];
            wallets = oData.wallets || {};
            businessAccounts = oData.businessAccounts || {};
            promoCodes = oData.promoCodes || [];
            subscriptions = oData.subscriptions || [];
            debts = oData.debts || [];
            cards = oData.cards || [];
            topUpRequests = oData.topUpRequests || [];

            users.forEach(u => {
                if (!wallets[u.id]) {
                    wallets[u.id] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
                }
            });
            if (wallets['00000']) wallets['00000'].balance = 999999999;

            const adminExists = users.some(u => u.id === '00000');
            if (!adminExists) {
                users.push({ id: '00000', fio: 'Администратор', email: 'admin@ad.systems', password: '31441537a', role: 'admin', status: 'Администратор', roles: [], avatar: '', bio: '', phone: '', banned: false, banReason: '', banExpiry: null, walletId: '00000', cardId: '', businessName: '', masterService: '', commission: 30 });
                if (!wallets['00000']) wallets['00000'] = { balance: 999999999, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
                await saveAll();
            }

            const session = sessionStorage.getItem('ad_session');
            if (session) {
                const p = JSON.parse(session);
                const u = users.find(x => x.id === p.id);
                if (u && !isBanned(u)) { currentUser = u; showMain(); return; }
            }
            if (!checkRemember()) showAuth();
        } catch (e) { console.error(e); showToast('❌ Ошибка загрузки'); showAuth(); }
    }

    async function saveAll() {
        await writeBin(USERS_BIN_ID, { users });
        await writeBin(ORDERS_BIN_ID, {
            orders, notifications, supportTickets, chats, messages, stickers, roles, statuses,
            wallets, businessAccounts, promoCodes, subscriptions, debts, cards, topUpRequests
        });
    }

    // ===== АВТОРИЗАЦИЯ =====
    document.querySelectorAll('[data-tab]').forEach(b => {
        b.addEventListener('click', function() {
            document.querySelectorAll('[data-tab]').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.auth-form').forEach(x => x.classList.remove('active'));
            document.getElementById('form' + this.dataset.tab.charAt(0).toUpperCase() + this.dataset.tab.slice(1)).classList.add('active');
        });
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        const rem = document.getElementById('rememberMe').checked;
        const err = document.getElementById('loginError');
        const user = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === pass);
        if (!user) { err.textContent = '❌ Неверный email или пароль'; err.classList.add('show'); return; }
        if (isBanned(user)) { const info = getBanInfo(user); err.textContent = `🚫 Аккаунт забанен. Причина: ${info?.reason || '—'}`; err.classList.add('show'); return; }
        err.classList.remove('show');
        currentUser = user;
        if (rem) localStorage.setItem('ad_remember', JSON.stringify({ id: user.id, fio: user.fio, email: user.email }));
        else localStorage.removeItem('ad_remember');
        sessionStorage.setItem('ad_session', JSON.stringify({ id: user.id }));
        showMain();
    });

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const fio = document.getElementById('regFio').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value.trim();
        const agree = document.getElementById('regAgreement').checked;
        const err = document.getElementById('registerError');
        if (!agree) { err.textContent = '❌ Примите соглашение'; err.classList.add('show'); return; }
        if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) { err.textContent = '❌ Email уже зарегистрирован'; err.classList.add('show'); return; }
        if (pass.length < 6) { err.textContent = '❌ Пароль минимум 6 символов'; err.classList.add('show'); return; }
        const nu = { id: generateId(), fio, email, password: pass, role: 'user', status: 'Пользователь', roles: [], avatar: '', bio: '', phone: '', banned: false, banReason: '', banExpiry: null, walletId: generateId(), cardId: '', businessName: '', masterService: '', commission: 30 };
        users.push(nu);
        wallets[nu.id] = { balance: 0, cardNumber: '0000 0000 0000 0000', qrCode: '', blocked: false, blockReason: '', blockExpiry: null, transactions: [] };
        await saveAll();
        err.classList.remove('show');
        showToast('✅ Аккаунт создан! Войдите.');
        document.querySelector('[data-tab="login"]').click();
        document.getElementById('loginEmail').value = email;
        document.getElementById('loginPassword').value = '';
        document.getElementById('regFio').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regAgreement').checked = false;
    });

    function checkRemember() {
        const d = localStorage.getItem('ad_remember');
        if (!d) return false;
        try {
            const data = JSON.parse(d);
            const user = users.find(u => u.id === data.id);
            if (user && !isBanned(user)) {
                document.getElementById('checkUserName').textContent = user.fio;
                document.getElementById('checkUserEmail').textContent = user.email;
                document.getElementById('checkAvatar').textContent = user.fio.charAt(0).toUpperCase();
                document.getElementById('checkUserOverlay').classList.add('active');
                document.getElementById('checkYes').onclick = function() {
                    document.getElementById('checkUserOverlay').classList.remove('active');
                    currentUser = user;
                    sessionStorage.setItem('ad_session', JSON.stringify({ id: user.id }));
                    showMain();
                };
                document.getElementById('checkNo').onclick = function() {
                    document.getElementById('checkUserOverlay').classList.remove('active');
                    localStorage.removeItem('ad_remember');
                    showAuth();
                };
                return true;
            }
        } catch (e) {}
        return false;
    }

    function showAuth() {
        document.getElementById('authPage').style.display = 'flex';
        document.getElementById('mainPage').classList.remove('active');
        document.getElementById('panelsContainer').classList.remove('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
    }

    function showMain() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('mainPage').classList.add('active');
        document.getElementById('panelsContainer').classList.remove('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('headerUserName').textContent = currentUser.fio;
        document.getElementById('headerUserRole').textContent = currentUser.role === 'admin' ? '👑 Администратор' : 'Пользователь';
        document.getElementById('headerAvatar').textContent = currentUser.fio.charAt(0).toUpperCase();
        generateSections();
        renderAll();
        initButtons();
    }

    function initButtons() {
        // Кнопки заказа
        document.getElementById('btnFoodOrder').onclick = () => openModal('modalFood');
        document.getElementById('btnWorkVacancy').onclick = () => openModal('modalVacancy');
        document.getElementById('btnCleaningOrder').onclick = () => openModal('modalCleaning');
        document.getElementById('btnMassageOrder').onclick = () => openModal('modalMassage');
        document.getElementById('btnLegalOrder').onclick = () => openModal('modalLegal');
        document.getElementById('btnCourtOrder').onclick = () => openModal('modalCourt');
        document.getElementById('btnSupportNew').onclick = () => openModal('modalSupportNew');
        document.getElementById('btnRoomVisitRequest').onclick = () => openModal('modalRoomVisitRequest');

        // Закрытие модалок
        document.querySelectorAll('.modal-close').forEach(btn => {
            btn.onclick = function() {
                const overlay = this.closest('.modal-overlay');
                if (overlay) overlay.style.display = 'none';
            };
        });
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) this.style.display = 'none';
            });
        });
    }

    // ===== ПАНЕЛИ =====
    function showPanel(panelId) {
        document.getElementById('mainPage').classList.remove('active');
        document.getElementById('panelsContainer').classList.add('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
        const el = document.getElementById('panel-' + panelId);
        if (el) el.classList.add('active');
        renderAll();
        if (panelId === 'admin') renderAdmin();
        if (panelId === 'history') renderHistory();
        if (panelId === 'messenger') renderMessenger();
        if (panelId === 'profile') renderProfile();
        if (panelId === 'support') renderSupport();
        if (panelId === 'wallet') renderWallet();
        if (panelId === 'bank') renderBank();
        if (panelId === 'roomvisit') renderRoomVisit();
    }

    function goBack() {
        document.getElementById('mainPage').classList.add('active');
        document.getElementById('panelsContainer').classList.remove('active');
        document.querySelectorAll('.service-panel').forEach(p => p.classList.remove('active'));
        renderAll();
    }

    document.addEventListener('click', function(e) {
        const backBtn = e.target.closest('[data-back]');
        if (backBtn) { e.preventDefault(); goBack(); }
        const logoutBtn = e.target.closest('#logoutBtn');
        if (logoutBtn) {
            sessionStorage.removeItem('ad_session');
            localStorage.removeItem('ad_remember');
            currentUser = null;
            showAuth();
            document.getElementById('mainPage').classList.remove('active');
            document.getElementById('panelsContainer').classList.remove('active');
        }
    });

    // ===== ГЕНЕРАЦИЯ СЕКЦИЙ =====
    const sections = [
        { id: 'food', icon: '🍕', title: 'Еда', desc: 'Заказать' },
        { id: 'work', icon: '💼', title: 'Работа', desc: 'Вакансии' },
        { id: 'cleaning', icon: '🧹', title: 'Уборка', desc: 'Заказать' },
        { id: 'massage', icon: '💆', title: 'Массаж', desc: 'Записаться' },
        { id: 'legal', icon: '⚖️', title: 'Юрист', desc: 'Консультация' },
        { id: 'court', icon: '🏛️', title: 'Суд', desc: 'Подать иск' },
        { id: 'history', icon: '📋', title: 'История', desc: 'Все заказы' },
        { id: 'messenger', icon: '💬', title: 'Мессенджер', desc: 'Общение' },
        { id: 'profile', icon: '👤', title: 'Профиль', desc: 'Личные данные' },
        { id: 'support', icon: '🆘', title: 'Поддержка', desc: 'Написать' },
        { id: 'wallet', icon: '💰', title: 'Кошелёк', desc: 'Баланс' },
        { id: 'bank', icon: '💳', title: 'Банк', desc: 'Карты и QR' },
        { id: 'roomvisit', icon: '🚪', title: 'Посещение', desc: 'Заявки на вход' },
        { id: 'admin', icon: '👑', title: 'Админка', desc: 'Управление', badge: 'Только админ' }
    ];

    function generateSections() {
        const grid = document.getElementById('sectionsGrid');
        grid.innerHTML = '';
        sections.forEach(sec => {
            if (sec.id === 'admin' && currentUser.role !== 'admin') return;
            const card = document.createElement('div');
            card.className = 'section-card';
            card.dataset.section = sec.id;
            card.innerHTML = `
                <div class="section-image" style="background:linear-gradient(135deg,#fef3c7,#fde68a);">${sec.icon}</div>
                <div class="section-info">
                    <h3>${sec.icon} ${sec.title}</h3>
                    <p>${sec.desc}</p>
                    ${sec.badge ? `<span class="section-badge">${sec.badge}</span>` : ''}
                </div>
            `;
            card.addEventListener('click', function() {
                const secId = this.dataset.section;
                if (secId === 'admin' && currentUser.role !== 'admin') { showToast('⛔ Доступ только для администратора'); return; }
                showPanel(secId);
            });
            grid.appendChild(card);
        });
    }

    // ================================================================
    // РЕНДЕР РАЗДЕЛОВ (ЕДА, РАБОТА, УБОРКА, МАССАЖ, ЮРИСТ, СУД)
    // ================================================================
    function renderFood() {
        const container = document.getElementById('foodContainer');
        const items = orders.food.filter(o => o.userId === currentUser.id || currentUser.role === 'admin');
        if (!items.length) {
            container.innerHTML = '<div class="empty-state">Нет заказов</div>';
            return;
        }
        container.innerHTML = items.map(o => `
            <div class="card">
                <div class="card-header">
                    <span class="card-id">${o.id}</span>
                    <span class="card-status status-${statusClass(o.status)}">${statusText(o.status)}</span>
                </div>
                <div class="card-detail"><strong>Блюдо:</strong> ${o.dish}</div>
                <div class="card-detail"><strong>Комната:</strong> ${o.room}</div>
                <div class="card-detail"><strong>Кол-во:</strong> ${o.qty}</div>
                <div class="card-detail"><strong>Цена:</strong> ${o.price !== undefined && o.price !== null ? o.price + ' ₽' : '—'}</div>
                ${o.promoDiscount ? `<div class="card-detail"><strong>Скидка:</strong> ${o.promoDiscount}%</div>` : ''}
                <div class="card-detail" style="font-size:0.7rem;color:#8b97a8;">${o.time}</div>
            </div>
        `).join('');
    }

    function renderVacancies() {
        const container = document.getElementById('workVacancies');
        const items = orders.vacancies || [];
        if (!items.length) {
            container.innerHTML = '<div class="empty-state">Нет вакансий</div>';
            return;
        }
        container.innerHTML = items.map(v => `
            <div class="card">
                <div class="card-header">
                    <span class="card-id">${v.id}</span>
                    <span class="card-status status-${statusClass(v.status)}">${statusText(v.status)}</span>
                </div>
                <div class="card-detail"><strong>${v.title}</strong></div>
                <div class="card-detail">Компания: ${v.company}</div>

                    </div>
                    <div id="qrContainer" style="margin-top:.5rem;"></div>
                </div>
            ` : `
                <div class="empty-state">У вас нет карты. Выпустите новую.</div>
                <button class="btn" id="issueCardBtn">➕ Выпустить карту</button>
            `}
        `;
        container.innerHTML = html;

        if (!userCard) {
            document.getElementById('issueCardBtn').onclick = async function() {
                await issueCard(currentUser.id);
                renderBank();
            };
        } else {
            document.getElementById('blockCardBtn')?.addEventListener('click', function() {
                const reason = prompt('Причина блокировки:');
                if (reason !== null) {
                    blockCard(userCard.id, reason, 'forever', '');
                }
            });
            document.getElementById('unblockCardBtn')?.addEventListener('click', async function() {
                const card = cards.find(c => c.id === userCard.id);
                if (card) {
                    card.blocked = false;
                    card.blockReason = '';
                    card.blockExpiry = null;
                    const wallet = getWallet(card.userId);
                    if (wallet) { wallet.blocked = false; wallet.blockReason = ''; wallet.blockExpiry = null; }
                    await saveAll();
                    showToast('🔓 Карта разблокирована');
                    renderBank();
                }
            });
            document.getElementById('generateQRBtn').onclick = function() {
                const amount = document.getElementById('qrAmount').value.trim();
                const desc = document.getElementById('qrDesc').value.trim() || 'Оплата';
                if (!amount || isNaN(amount) || parseFloat(amount) <= 0) { showToast('❌ Введите корректную сумму'); return; }
                const qrData = `pay:${userCard.id}:${amount}:${desc}`;
                const container = document.getElementById('qrContainer');
                container.innerHTML = '';
                try {
                    new QRCode(container, {
                        text: qrData,
                        width: 200,
                        height: 200,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    showToast('✅ QR-код сгенерирован');
                } catch (e) {
                    container.innerHTML = '<p style="color:#8b97a8;">Ошибка генерации QR</p>';
                }
            };
        }
    }

    function renderMessenger() {
        const container = document.getElementById('messengerChats');
        const chatIds = Object.keys(chats).filter(id => chats[id].includes(currentUser.id));
        // также можно начать чат с любым пользователем
        const otherUsers = users.filter(u => u.id !== currentUser.id && u.id !== '00000');
        let html = '<h3>Мои чаты</h3><div class="cards-grid">';
        if (chatIds.length === 0) {
            html += '<div class="empty-state">Нет чатов</div>';
        } else {
            chatIds.forEach(chatId => {
                const partnerId = chats[chatId].find(id => id !== currentUser.id);
                const partner = getUser(partnerId);
                const lastMsg = messages[chatId] && messages[chatId].length ? messages[chatId][messages[chatId].length - 1] : null;
                html += `
                    <div class="card" data-chat="${chatId}">
                        <div class="card-header">
                            <span class="card-id">${partner ? partner.fio : 'Неизвестный'}</span>
                            <span style="font-size:.7rem;color:#8b97a8;">${lastMsg ? lastMsg.time : ''}</span>
                        </div>
                        <div class="card-detail" style="font-size:.8rem;">${lastMsg ? lastMsg.text : 'Нет сообщений'}</div>
                    </div>
                `;
            });
        }
        html += '</div><h3>Начать новый чат</h3><div class="cards-grid">';
        otherUsers.forEach(u => {
            html += `
                <div class="card" data-newchat="${u.id}">
                    <div class="card-header"><span class="card-id">${u.fio}</span></div>
                    <div class="card-detail">${u.email}</div>
                    <button class="btn-sm gold">💬 Написать</button>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;

        // Обработчики для открытия чата
        container.querySelectorAll('[data-chat]').forEach(el => {
            el.addEventListener('click', function() {
                const chatId = this.dataset.chat;
                openChat(chatId);
            });
        });
        container.querySelectorAll('[data-newchat]').forEach(el => {
            el.addEventListener('click', function() {
                const userId = this.dataset.newchat;
                // Проверяем, есть ли уже чат
                let existing = null;
                for (const [cid, participants] of Object.entries(chats)) {
                    if (participants.includes(currentUser.id) && participants.includes(userId)) {
                        existing = cid;
                        break;
                    }
                }
                if (existing) {
                    openChat(existing);
                } else {
                    const newId = 'chat_' + Date.now();
                    chats[newId] = [currentUser.id, userId];
                    messages[newId] = [];
                    saveAll();
                    openChat(newId);
                }
            });
        });
    }

    function openChat(chatId) {
        currentChatId = chatId;
        document.getElementById('messengerChats').style.display = 'none';
        document.getElementById('messengerChatWindow').style.display = 'block';
        renderMessages();
    }

    function renderMessages() {
        const chatId = currentChatId;
        if (!chatId) return;
        const msgs = messages[chatId] || [];
        const participants = chats[chatId] || [];
        const partnerId = participants.find(id => id !== currentUser.id);
        const partner = getUser(partnerId);
        document.getElementById('chatPartnerName').textContent = partner ? partner.fio : 'Собеседник';

        const area = document.getElementById('messageArea');
        area.innerHTML = msgs.map(m => `
            <div class="message ${m.userId === currentUser.id ? 'own' : 'other'}">
                <div class="bubble">${m.text}${m.file ? ` <a href="${m.file}" target="_blank">📎</a>` : ''}
                    <span class="time">${m.time}</span>
                </div>
            </div>
        `).join('');
        area.scrollTop = area.scrollHeight;
    }

    document.getElementById('sendMessageBtn').addEventListener('click', async function() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) return;
        const msg = { userId: currentUser.id, text, time: now(), file: null };
        if (!messages[currentChatId]) messages[currentChatId] = [];
        messages[currentChatId].push(msg);
        input.value = '';
        await saveAll();
        renderMessages();
    });

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('sendMessageBtn').click();

            else if (v.status === 'rejected') statusHtml = '<span class="card-status status-rejected">❌ Отклонено</span>';
            else if (v.status === 'completed') statusHtml = '<span class="card-status status-done">✅ Завершено</span>';
            else if (v.status === 'active') statusHtml = '<span class="card-status status-processing">🔄 Идёт посещение</span>';
            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-id">${v.id}</span>

                    </div>
                    <div class="card-detail"><strong>Цель:</strong> ${v.purpose}</div>

                            text: 'roomvisit:' + v.id,
                            width: 180,
                            height: 180,
                            colorDark: "#000000",
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                    } catch (e) {
                        container.innerHTML = '<p style="color:#8b97a8;">QR-код (библиотека не загружена)</p>';
                    }
                }
            }, 200);
        });
    }

    // ---- Обработчики для заказов ----
    function handleApprove(e) {
        const btn = e.currentTarget;
        const orderId = btn.dataset.orderId;
        const input = document.querySelector(`.admin-price-input[data-order-id="${orderId}"]`);
        const price = parseFloat(input?.value);
        if (isNaN(price) || price <= 0) {
            showToast('❌ Введите корректную цену');
            return;
        }
        let order = null;
        for (const key in orders) {
            if (Array.isArray(orders[key])) {
                const found = orders[key].find(o => o.id === orderId);
                if (found) { order = found; break; }
            }
        }
        if (!order) { showToast('❌ Заказ не найден'); return; }
        const wallet = getWallet(order.userId);
        if (wallet.balance < price) {
            order.status = 'rejected';
            order.rejectReason = `Недостаточно средств. Требуется: ${price} ₽`;
            order.price = price;
            saveAll().then(() => { renderAdmin(); showToast(`❌ Заказ отклонён: недостаточно средств (${price} ₽)`); });
            return;
        }
        processTransaction(order.userId, '00000', price, `Оплата заказа ${order.id}`).then(success => {
            if (success) {
                order.status = 'approved';
                order.price = price;
                order.adminComment = 'Одобрено администратором';
                saveAll().then(() => { renderAdmin(); showToast('✅ Заказ одобрен и оплачен'); });
            } else {
                order.status = 'rejected';
                order.rejectReason = 'Ошибка оплаты';
                saveAll().then(() => { renderAdmin(); showToast('❌ Ошибка оплаты'); });
            }
        });
    }

    function handleReject(e) {
        const btn = e.currentTarget;
        const orderId = btn.dataset.orderId;
        const reason = prompt('Причина отказа:');
        if (reason === null) return;
        let order = null;
        for (const key in orders) {
            if (Array.isArray(orders[key])) {
                const found = orders[key].find(o => o.id === orderId);
                if (found) { order = found; break; }
            }
        }
        if (!order) { showToast('❌ Заказ не найден'); return; }
        order.status = 'rejected';
        order.rejectReason = reason || 'Отклонено администратором';
        saveAll().then(() => { renderAdmin(); showToast('❌ Заказ отклонён'); });
    }

    async function handleWalletDeduct(e) {

                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">
                        ${roles.map(r => `

                modal.remove();
                renderAdmin();
            }
        });
    }

    // ================================================================
    // СКАНЕР QR (для посещений)
    // ================================================================
    function startRoomVisitScanner() {
        const readerDiv = document.getElementById('roomVisitScanner');
        if (!readerDiv) return;
        readerDiv.innerHTML = '';
        const scanner = new Html5Qrcode("roomVisitScanner");
        scanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: { width: 250, height: 250 } },
            async function(decodedText) {
                if (decodedText.startsWith('roomvisit:')) {
                    const visitId = decodedText.replace('roomvisit:', '');
                    const visit = orders.roomVisits.find(v => v.id === visitId);
                    if (!visit) {
                        showToast('❌ Заявка не найдена');
                        scanner.stop();
                        closeModal('modalRoomVisitScan');
                        return;
                    }
                    if (visit.status !== 'approved') {
                        showToast('❌ Заявка не одобрена или уже завершена');
                        scanner.stop();
                        closeModal('modalRoomVisitScan');
                        return;
                    }
                    const nowTime = new Date();
                    const visitDate = new Date(visit.date + 'T' + visit.time);
                    const diffMinutes = (nowTime - visitDate) / (1000 * 60);
                    if (Math.abs(diffMinutes) > 30) {
                        showToast(`❌ Время посещения не совпадает (допуск ±30 мин). Запланировано: ${visit.date} ${visit.time}`);
                        scanner.stop();
                        closeModal('modalRoomVisitScan');
                        return;
                    }
                    const resultDiv = document.getElementById('roomVisitScanResult');
                    resultDiv.innerHTML = `
                        <p style="color:#27ae60;">✅ QR-код действителен. Время совпадает.</p>
                        ${!visit.startTime ? '<button class="btn" id="roomVisitStartBtn">▶️ Начать посещение</button>' : '<button class="btn" id="roomVisitFinishBtn">⏹️ Завершить посещение</button>'}
                    `;
                    if (!visit.startTime) {
                        document.getElementById('roomVisitStartBtn').addEventListener('click', async function() {
                            visit.status = 'active';
                            visit.startTime = now();
                            await saveAll();
                            showToast('🔄 Посещение начато');
                            closeModal('modalRoomVisitScan');
                            renderAdmin();
                        });
                    } else {
                        document.getElementById('roomVisitFinishBtn').addEventListener('click', async function() {
                            visit.status = 'completed';
                            visit.endTime = now();
                            addNotif(visit.userId, '✅ Посещение завершено', `Ваше посещение комнаты ${visit.id} завершено`);
                            await saveAll();
                            showToast('⏹️ Посещение завершено');
                            closeModal('modalRoomVisitScan');
                            renderAdmin();
                        });
                    }
                    scanner.stop();
                }
            },
            function(err) {}
        );
    }

    document.getElementById('formCourt').addEventListener('submit', async function(e) {
        e.preventDefault();
        const fio = document.getElementById('courtFio').value.trim();
        const defendant = document.getElementById('courtDefendant').value.trim();
        const address = document.getElementById('courtAddress').value.trim();
        const defendantAddress = document.getElementById('courtDefendantAddress').value.trim();
        const reason = document.getElementById('courtReason').value.trim();
        const order = { id: genSid('CRT'), userId: currentUser.id, userFio: currentUser.fio, fio, defendant, address, defendantAddress, reason, status: 'pending', timeCreated: now(), price: null };
        orders.court.push(order);
        await saveAll();
        renderAll();
        showToast('✅ Иск подан!');
        closeModal('modalCourt');
        this.reset();
    });

    document.getElementById('formVacancy').addEventListener('submit', async function(e) {
        e.preventDefault();
        const title = document.getElementById('vacancyTitle').value.trim();
        const company = document.getElementById('vacancyCompany').value.trim();
        const places = parseInt(document.getElementById('vacancyPlaces').value) || 1;
        const desc = document.getElementById('vacancyDesc').value.trim();
        const requirements = document.getElementById('vacancyRequirements').value.trim();
        const vacancy = { id: genSid('VAC'), userId: currentUser.id, userFio: currentUser.fio, title, company, places, desc, requirements, status: 'active', time: now() };
        orders.vacancies.push(vacancy);
        await saveAll();
        renderAll();
        showToast('✅ Вакансия создана!');
        closeModal('modalVacancy');
        this.reset();
    });

    document.getElementById('formApplication').addEventListener('submit', async function(e) {
        e.preventDefault();
        const vacancyId = document.getElementById('appVacancy').value.trim();
        const info = document.getElementById('appInfo').value.trim();
        const extras = Array.from(document.querySelectorAll('#formApplication .checkbox-group input:checked')).map(cb => cb.value);
        const app = { id: genSid('APP'), userId: currentUser.id, userFio: currentUser.fio, vacancyId, info, extras, status: 'pending', time: now() };
        orders.applications.push(app);
        await saveAll();
        renderAll();
        showToast('✅ Отклик отправлен!');
        closeModal('modalApplication');
        this.reset();
    });

    document.getElementById('formSupportNew').addEventListener('submit', async function(e) {
        e.preventDefault();
        const problem = document.getElementById('supportProblem').value.trim();
        const urgency = document.getElementById('supportUrgency').value;
        const ticket = { id: genSid('SPT'), userId: currentUser.id, userFio: currentUser.fio, problem, urgency, status: 'open', time: now(), adminReply: '' };
        supportTickets.push(ticket);
        await saveAll();
        renderAll();
        showToast('✅ Обращение отправлено!');
        closeModal('modalSupportNew');
        this.reset();
    });

    document.getElementById('formSupportReply').addEventListener('submit', async function(e) {
        e.preventDefault();
        const reply = document.getElementById('supportReplyText').value.trim();
        if (supportReplyTarget !== null && supportTickets[supportReplyTarget]) {
            supportTickets[supportReplyTarget].adminReply = reply;
            supportTickets[supportReplyTarget].status = 'resolved';
            await saveAll();
            showToast('✅ Ответ отправлен');
            closeModal('modalSupportReply');
            renderAdmin();
        }
    });

    document.getElementById('formTopUpRequest').addEventListener('submit', async function(e) {
        e.preventDefault();
        const message = document.getElementById('topUpMessage').value.trim();
        if (!message) { showToast('❌ Напишите сообщение'); return; }
        const req = { id: genSid('TUR'), userId: currentUser.id, userFio: currentUser.fio, message, status: 'pending', time: now(), adminReply: '' };
        topUpRequests.push(req);
        await saveAll();
        showToast('✅ Запрос отправлен администратору');
        closeModal('modalTopUpRequest');
        this.reset();
    });

    document.getElementById('formPromoCreate').addEventListener('submit', async function(e) {
        e.preventDefault();
        const code = document.getElementById('promoCode').value.trim().toUpperCase();
        const discount = parseInt(document.getElementById('promoDiscount').value);
        const validUntil = document.getElementById('promoValidUntil').value;
        const maxActivations = parseInt(document.getElementById('promoMaxActivations').value);
        const service = document.getElementById('promoService').value;
        if (promoCodes.some(p => p.code === code)) { showToast('❌ Промокод уже существует'); return; }
        promoCodes.push({ code, discount, validUntil, maxActivations, service, usedCount: 0, usedBy: [] });
        await saveAll();
        showToast('🎫 Промокод создан!');
        closeModal('modalPromoCreate');
        this.reset();
        renderAdmin();
    });

    document.getElementById('formSubscriptionIssue').addEventListener('submit', async function(e) {
        e.preventDefault();
        const userId = document.getElementById('subUserId').value.trim();
        const service = document.getElementById('subService').value;
        const sessions = parseInt(document.getElementById('subSessions').value);
        const validUntil = document.getElementById('subValidUntil').value;
        const user = getUser(userId);
        if (!user) { showToast('❌ Пользователь не найден'); return; }
        subscriptions.push({ id: genSid('SUB'), userId, service, remainingSessions: sessions, validUntil, issued: now() });
        await saveAll();
        showToast('✅ Абонемент выдан!');
        closeModal('modalSubscriptionIssue');
        this.reset();
        renderAdmin();
    });

    // ===== ОБЩИЙ РЕНДЕР =====
    function renderAll() {
        renderFood();
        renderVacancies();
        renderApplications();
        renderCleaning();
        renderMassage();
        renderLegal();
        renderCourt();
        // Дополнительные разделы рендерятся по мере открытия панелей
    }

    // ===== ЗАПУСК =====
    document.addEventListener('DOMContentLoaded', function() {
        loadAll();
    });

})();
</script>
